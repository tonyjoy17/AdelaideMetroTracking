name: Sync Static GTFS

on:
  workflow_dispatch:
  schedule:
    - cron: "35 14 * * *"

permissions:
  contents: write

jobs:
  sync-static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync static data
        run: npm run sync:static

      - name: Build stop trip index
        run: node scripts/build-stop-trip-index.js ./data/static/current

      - name: Commit updated static data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/static/current
          if git diff --cached --quiet; then
            echo "No static data changes to commit"
            exit 0
          fi
          git commit -m "chore: update static GTFS data"

      - name: Push changes
        shell: bash
        run: |
          if git diff --quiet HEAD~1 HEAD -- data/static/current 2>/dev/null; then
            echo "No committed static data changes to push"
            exit 0
          fi
          git push