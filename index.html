<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f2f4fb">
<title>Adelaide Metro</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f2f4fb;--surface:#fff;--surface2:#f0f3fb;--surface3:#e6eaf7;
  --glass:rgba(255,255,255,.92);
  --ink:#0b1628;--ink2:#2d3f66;--ink3:#6b7fa3;--ink4:#a8b5cc;
  --line:#e0e6f5;--line2:#c8d3eb;
  --tram:#00897b;--tram-lt:#e0f5f2;--tram-mid:#80cbc4;--tram-glow:rgba(0,137,123,.25);
  --train:#3949ab;--train-lt:#e8eaf6;--train-mid:#9fa8da;--train-glow:rgba(57,73,171,.2);
  --bus:#e65100;--bus-lt:#fff3e0;--bus-mid:#ffb74d;--bus-glow:rgba(230,81,0,.2);
  --stopped:#78909c;--stopped-lt:#eceff1;
  --ok:#2e7d32;--ok-lt:#e8f5e9;
  --warn:#e65100;--warn-lt:#fff3e0;
  --danger:#b71c1c;--danger-lt:#ffebee;
  --fav:#d81b60;--fav-lt:#fce4ec;
  --crowd-low:#43a047;--crowd-mid:#fb8c00;--crowd-high:#e53935;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;
  --sh0:0 1px 2px rgba(0,0,0,.06);
  --sh1:0 2px 6px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
  --sh2:0 6px 20px rgba(0,0,0,.09),0 2px 6px rgba(0,0,0,.06);
  --sh3:0 16px 48px rgba(0,0,0,.12),0 4px 12px rgba(0,0,0,.07);
  --font:'Outfit',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --topbar:56px;--sidebar:340px;--tabbar:52px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;height:100%;overflow:hidden}
body{font-family:var(--font);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit;outline:none;-webkit-tap-highlight-color:transparent}
input{border:none;background:none;font:inherit;color:inherit;outline:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}
.leaflet-control-attribution{font-size:9px!important}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes loadBar{0%{width:0;margin-left:0}50%{width:65%;margin-left:0}100%{width:0;margin-left:100%}}

/* Smooth vehicle movement — Uber style */
.leaflet-marker-icon { transition: transform 0.9s cubic-bezier(0.25,0.46,0.45,0.94) !important; }
.leaflet-marker-icon.no-transition { transition: none !important; }

/* ── LOADING ── */
#loading-screen{position:fixed;inset:0;z-index:9999;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .45s}
#loading-screen.fade{opacity:0;pointer-events:none}
.ld-icon{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,var(--tram),#00bcd4);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 28px rgba(0,137,123,.35);animation:bounce 1.3s ease-in-out infinite}
.ld-icon svg{width:30px;height:30px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.ld-title{font-size:22px;font-weight:800;letter-spacing:-.3px}
.ld-sub{font-size:14px;color:var(--ink3);font-weight:500}
.ld-bar-wrap{width:150px;height:3px;background:var(--line);border-radius:3px;overflow:hidden}
.ld-bar{height:100%;background:var(--tram);border-radius:3px;animation:loadBar 1.8s ease-in-out infinite}
.ld-msg{font-size:11px;color:var(--ink4);font-family:var(--mono)}

/* ── TOPBAR ── */
#topbar{position:absolute;top:0;left:0;right:0;z-index:100;height:var(--topbar);display:flex;align-items:center;gap:10px;padding:0 14px;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line);box-shadow:var(--sh1)}
.tb-logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.tb-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--tram),#00bcd4);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,137,123,.3)}
.tb-icon svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.tb-name{font-size:16px;font-weight:800;letter-spacing:-.3px}
.tb-sub{font-size:10px;color:var(--ink3);font-weight:500}
.live-pill{display:flex;align-items:center;gap:5px;background:var(--ok-lt);color:var(--ok);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;flex-shrink:0}
.live-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s ease-in-out infinite}

/* ── SEARCH ── */
.search-wrap{flex:1;max-width:500px;position:relative}
.search-row{display:flex;align-items:center;gap:8px;height:38px;background:var(--surface2);border:1.5px solid var(--line);border-radius:20px;padding:0 14px;transition:border-color .2s,box-shadow .2s}
.search-row:focus-within{border-color:var(--tram);box-shadow:0 0 0 3px var(--tram-glow);background:var(--surface)}
.search-row svg{opacity:.35;flex-shrink:0}
.search-row input{flex:1;font-size:13px}
.search-row input::placeholder{color:var(--ink4)}
.search-clear{width:18px;height:18px;border-radius:50%;background:var(--line2);color:var(--ink3);display:none;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.search-clear.show{display:flex}
.search-drop{position:absolute;top:calc(100% + 8px);left:0;right:0;z-index:200;background:var(--surface);border:1px solid var(--line2);border-radius:var(--r16);box-shadow:var(--sh3);max-height:360px;overflow-y:auto;display:none;animation:fadeUp .15s ease}
.search-drop.show{display:block}
.dd-sec{padding:7px 14px 4px;font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--line)}
.dd-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .1s}
.dd-item:hover{background:var(--surface2)}
.dd-badge{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:600;flex-shrink:0;text-align:center;line-height:1.2}
.dd-name{font-size:13px;font-weight:600;line-height:1.2}
.dd-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.dd-empty{padding:16px 14px;font-size:13px;color:var(--ink3)}

/* ── TABBAR ── */
#tabbar{position:absolute;bottom:0;left:0;right:0;z-index:100;height:var(--tabbar);display:flex;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--line);box-shadow:0 -2px 12px rgba(0,0,0,.07)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 4px 8px;font-size:10px;font-weight:600;color:var(--ink3);border-top:2.5px solid transparent;transition:all .18s;position:relative}
.tab-btn.on{color:var(--ink)}
.tab-btn.on[data-t="all"]   {border-color:var(--ink);color:var(--ink)}
.tab-btn.on[data-t="tram"]  {border-color:var(--tram);color:var(--tram)}
.tab-btn.on[data-t="train"] {border-color:var(--train);color:var(--train)}
.tab-btn.on[data-t="bus"]   {border-color:var(--bus);color:var(--bus)}
.tab-btn.on[data-t="alerts"]{border-color:var(--danger);color:var(--danger)}
.tab-icon{font-size:20px;line-height:1}
.tab-ct{position:absolute;top:5px;right:calc(50% - 18px);background:var(--surface3);color:var(--ink2);border-radius:10px;padding:1px 5px;font-size:9px;font-weight:700;font-family:var(--mono);min-width:18px;text-align:center;transition:all .18s}
.tab-btn.on .tab-ct{background:currentColor;color:white}

/* ── MAP ── */
#map{position:absolute;inset:0;z-index:0}
.map-ctrl{position:absolute;top:calc(var(--topbar) + 10px);right:10px;z-index:40;display:flex;flex-direction:column;gap:6px}
.mc-btn{width:36px;height:36px;border-radius:var(--r8);background:var(--glass);border:1px solid var(--line);box-shadow:var(--sh1);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--ink2);transition:all .15s}
.mc-btn:hover{background:var(--surface2);box-shadow:var(--sh2)}
.mc-btn.on{background:var(--tram);color:white;border-color:var(--tram)}
.map-legend{position:absolute;bottom:calc(var(--tabbar) + 10px);right:10px;z-index:40;background:var(--glass);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:var(--r12);box-shadow:var(--sh1);padding:9px 12px;display:flex;flex-direction:column;gap:5px}
.leg-row{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--ink2);font-weight:500}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.user-dot{width:14px;height:14px;border-radius:50%;background:#2196f3;border:3px solid white;box-shadow:0 2px 8px rgba(33,150,243,.5)}

/* ── SIDEBAR ── */
#sidebar{position:absolute;top:var(--topbar);left:0;bottom:var(--tabbar);width:var(--sidebar);z-index:50;background:var(--surface);border-right:1px solid var(--line);box-shadow:var(--sh2);display:flex;flex-direction:column}
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--line);flex-shrink:0}
.stat-box{padding:9px 10px;border-right:1px solid var(--line)}
.stat-box:last-child{border-right:none}
.stat-n{font-size:20px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.stat-l{font-size:9px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.sb-scroll{flex:1;overflow-y:auto}

/* ── VEHICLE LIST ── */
.vg-hdr{position:sticky;top:0;z-index:5;padding:6px 12px 4px;background:var(--surface2);border-bottom:1px solid var(--line);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.vg-pill{padding:1px 7px;border-radius:10px;font-size:9px;font-weight:700;font-family:var(--mono)}
.vcard{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s;position:relative}
.vcard:hover{background:var(--surface2)}
.vcard.sel{background:var(--surface2);border-left:3px solid var(--tram);padding-left:9px}
.vcard.sel[data-t="train"]{border-left-color:var(--train)}
.vcard.sel[data-t="bus"]{border-left-color:var(--bus)}
.vc-bd{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:600;line-height:1.2;text-align:center;flex-shrink:0}
.vc-body{flex:1;min-width:0}
.vc-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.vc-sub{display:flex;align-items:center;gap:4px;margin-top:2px;font-size:10px;color:var(--ink3);font-weight:500}
.vc-dot{width:2px;height:2px;border-radius:50%;background:var(--ink4)}
.vc-occ{font-size:11px;margin-top:3px;display:flex;align-items:center;gap:4px;color:var(--ink3)}
.vc-right{flex-shrink:0;text-align:right}
.vc-spd{font-family:var(--mono);font-size:12px;font-weight:500;line-height:1}
.vc-bear{font-size:10px;color:var(--ink3);margin-top:2px}
.vc-fav{position:absolute;top:8px;right:7px;width:5px;height:5px;border-radius:50%;background:var(--fav)}
.vc-alert{position:absolute;top:8px;right:15px;width:5px;height:5px;border-radius:50%;background:var(--danger);animation:blink 1.4s step-end infinite}
.empty{padding:40px 16px;text-align:center}
.empty-i{font-size:36px;margin-bottom:10px;opacity:.25}
.empty-t{font-size:13px;color:var(--ink3);font-weight:500}
.empty-s{font-size:11px;color:var(--ink4);margin-top:4px}

/* ── ALERTS ── */
.alerts-list{padding:10px;display:flex;flex-direction:column;gap:8px}
.alert-card{border-radius:var(--r12);background:var(--danger-lt);border:1px solid rgba(183,28,28,.15);overflow:hidden;animation:fadeUp .2s ease}
.alert-hd{display:flex;align-items:flex-start;gap:8px;padding:10px 12px 6px}
.alert-ico{font-size:15px;flex-shrink:0;margin-top:1px}
.alert-title{font-size:13px;font-weight:700;color:var(--danger);line-height:1.35}
.alert-body{padding:0 12px 10px;font-size:12px;color:var(--ink2);line-height:1.6}
.alert-routes{display:flex;flex-wrap:wrap;gap:4px;padding:4px 12px 8px}
.alert-rt{display:inline-flex;align-items:center;gap:3px;background:rgba(183,28,28,.12);color:var(--danger);border-radius:6px;padding:2px 7px;font-family:var(--mono);font-size:9px;font-weight:600}

/* ── STOP / DEPARTURES ── */
.stop-hdr{padding:12px 14px 10px;border-bottom:1px solid var(--line);flex-shrink:0}
.stop-hdr-row{display:flex;align-items:center;gap:8px}
.stop-back{width:28px;height:28px;border-radius:var(--r8);background:var(--surface2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:background .15s}
.stop-back:hover{background:var(--line)}
.stop-name-big{font-size:15px;font-weight:800;flex:1}
.stop-id-sm{font-size:11px;color:var(--ink3);font-family:var(--mono);margin-top:3px}
.dep-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s}
.dep-row:hover{background:var(--surface2)}
.dep-bd{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:600;flex-shrink:0;text-align:center;line-height:1.2}
.dep-body{flex:1;min-width:0}
.dep-route{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dep-head{font-size:11px;color:var(--ink3);margin-top:2px}
.dep-times{flex-shrink:0;text-align:right}
.dep-sched{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.dep-rt{font-family:var(--mono);font-size:13px;font-weight:700}
.dep-delay{font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px;display:inline-block;margin-top:2px}
.dep-delay.late{background:var(--danger-lt);color:var(--danger)}
.dep-delay.early,.dep-delay.ontime{background:var(--ok-lt);color:var(--ok)}

/* ── ETA countdown pill ── */
.eta-pill{
  display:inline-flex;align-items:center;gap:4px;
  font-family:var(--mono);font-size:14px;font-weight:700;
  padding:3px 9px;border-radius:20px;line-height:1;
  transition:color .3s,background .3s;
}
.eta-pill.urgent{background:#fff3e0;color:#e65100}   /* < 2 min */
.eta-pill.soon  {background:#e8f5e9;color:#2e7d32}   /* 2–8 min */
.eta-pill.later {background:var(--surface2);color:var(--ink2)} /* > 8 min */
.eta-pill.due   {background:#fce4ec;color:#c62828;animation:blink .7s step-end infinite}
.eta-sched{font-family:var(--mono);font-size:10px;color:var(--ink4);margin-top:1px}

/* ── Nearby stops ── */
.nearby-hdr{padding:12px 14px 10px;border-bottom:1px solid var(--line);flex-shrink:0}
.nearby-hdr-row{display:flex;align-items:center;gap:8px}
.nearby-title{font-size:15px;font-weight:800;flex:1}
.nearby-sub{font-size:11px;color:var(--ink3);margin-top:2px}
.nearby-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s}
.nearby-row:hover{background:var(--surface2)}
.nearby-dot{width:38px;height:38px;border-radius:50%;background:var(--surface3);border:1.5px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.nearby-body{flex:1;min-width:0}
.nearby-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nearby-meta{font-size:10px;color:var(--ink3);margin-top:2px}
.nearby-dist{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink2);flex-shrink:0}

/* ── DETAIL PANEL ── */
#detail{position:absolute;top:var(--topbar);right:0;bottom:var(--tabbar);width:360px;z-index:60;background:var(--surface);border-left:1px solid var(--line);box-shadow:var(--sh3);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.22,1,.36,1)}
#detail.open{transform:translateX(0)}
.dp-head{display:flex;align-items:center;gap:8px;padding:0 12px;height:48px;border-bottom:1px solid var(--line);flex-shrink:0}
.dp-back,.dp-fav,.dp-follow{width:30px;height:30px;border-radius:var(--r8);background:var(--surface2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;transition:all .15s}
.dp-back{font-size:15px;color:var(--ink2)}
.dp-back:hover{background:var(--line)}
.dp-fav{font-size:16px}
.dp-fav:hover{border-color:var(--fav)}
.dp-fav.on{background:var(--fav-lt);border-color:var(--fav)}
.dp-follow{font-size:14px}
.dp-follow.on{background:var(--tram);color:white;border-color:var(--tram)}
.dp-title{font-size:14px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dp-scroll{flex:1;overflow-y:auto}
.d-hero{margin:12px 12px 6px;padding:14px;background:var(--surface2);border:1px solid var(--line);border-radius:var(--r16);display:flex;gap:12px;align-items:flex-start}
.d-hero-bd{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:600;line-height:1.2;text-align:center;flex-shrink:0}
.d-hero-name{font-size:15px;font-weight:800;line-height:1.2;letter-spacing:-.2px}
.d-hero-long{font-size:11px;color:var(--ink3);margin-top:2px;line-height:1.4}
.d-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.d-chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid}
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:0 12px 6px}
.kpi{background:var(--surface2);border:1px solid var(--line);border-radius:var(--r12);padding:10px 8px;text-align:center}
.kpi-v{font-size:21px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.kpi-l{font-size:9px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.crowd-card{margin:0 12px 6px;background:var(--surface2);border:1px solid var(--line);border-radius:var(--r12);padding:12px 14px}
.crowd-lbl{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.crowd-bg{height:8px;background:var(--line);border-radius:4px;overflow:hidden;margin-bottom:8px}
.crowd-fill{height:100%;border-radius:4px;transition:width .5s ease}
.crowd-row{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700}
.crowd-row span:last-child{font-size:11px;color:var(--ink3);margin-left:auto;font-weight:400}
.d-sec{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:1px;text-transform:uppercase;padding:12px 14px 6px;display:flex;align-items:center;gap:8px}
.d-sec::after{content:'';flex:1;height:1px;background:var(--line)}
.gps-row{margin:0 12px 6px;display:flex;background:var(--surface2);border:1px solid var(--line);border-radius:var(--r12);overflow:hidden}
.gps-cell{flex:1;padding:10px 12px;border-right:1px solid var(--line)}
.gps-cell:last-child{border-right:none}
.gps-lbl{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.gps-val{font-family:var(--mono);font-size:12px;font-weight:500}
.dp-alert{margin:0 12px 6px;background:var(--danger-lt);border:1px solid rgba(183,28,28,.15);border-radius:var(--r12);padding:10px 12px}
.dp-alert-title{font-size:12px;font-weight:700;color:var(--danger);margin-bottom:3px}
.dp-alert-body{font-size:11px;color:var(--ink2);line-height:1.6}
.stop-tl{padding:0 0 4px}
.stop-row{display:flex;align-items:flex-start;gap:10px;padding:6px 14px}
.stop-spine{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:16px}
.stop-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--line2);background:var(--surface);flex-shrink:0}
.stop-dot.nxt{width:12px;height:12px}
.stop-conn{width:2px;flex:1;min-height:14px;background:var(--line)}
.stop-content{flex:1;padding-bottom:6px;min-width:0}
.stop-nm{font-size:12px;font-weight:600;line-height:1.3}
.stop-times{display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap}
.stop-sched{font-family:var(--mono);font-size:10px;color:var(--ink3)}
.stop-rt{font-family:var(--mono);font-size:10px;font-weight:600}
.stop-delay{font-size:9px;font-weight:700;padding:1px 5px;border-radius:7px}
.stop-delay.late{background:var(--danger-lt);color:var(--danger)}
.stop-delay.early,.stop-delay.ontime{background:var(--ok-lt);color:var(--ok)}
.trip-grid{margin:0 12px 12px;background:var(--surface2);border:1px solid var(--line);border-radius:var(--r12);display:grid;grid-template-columns:1fr 1fr}
.ti-cell{padding:10px 12px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
.ti-cell:nth-child(even){border-right:none}
.ti-cell:nth-last-child(-n+2){border-bottom:none}
.ti-lbl{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.ti-val{font-family:var(--mono);font-size:11px;font-weight:500;word-break:break-all}

/* ── Hamburger — desktop hidden ── */
#mob-hamburger{ display:none; }
#mob-backdrop{ display:none; }
.drawer-close-row{ display:none; }

@media(max-width:680px){
  :root{ --peek:156px; --expanded:72dvh; }

  /* topbar */
  #topbar{ position:fixed; top:0; left:0; right:0; z-index:200; padding:0 10px; gap:7px; }
  .tb-sub{ display:none; }
  .live-pill span{ display:none; }
  .live-pill{ padding:6px 8px; border-radius:50%; }

  /* hamburger */
  #mob-hamburger{
    display:flex; flex-direction:column; justify-content:center; gap:4px;
    width:36px; height:36px; border-radius:var(--r8);
    background:var(--surface2); border:1px solid var(--line);
    padding:8px 7px; flex-shrink:0; cursor:pointer; transition:background .15s;
  }
  #mob-hamburger:hover{ background:var(--line); }
  #mob-hamburger span{ display:block; height:2px; background:var(--ink2); border-radius:2px; transition:all .22s; }
  #mob-hamburger.open span:nth-child(1){ transform:translateY(6px) rotate(45deg); }
  #mob-hamburger.open span:nth-child(2){ opacity:0; transform:scaleX(0); }
  #mob-hamburger.open span:nth-child(3){ transform:translateY(-6px) rotate(-45deg); }

  /* tabbar */
  #tabbar{ position:fixed; bottom:0; left:0; right:0; z-index:200; }

  /* map fills between bars */
  #map{ position:fixed; top:var(--topbar); bottom:var(--tabbar); left:0; right:0; z-index:0; }

  /* map controls */
  .map-ctrl{ position:fixed; top:calc(var(--topbar) + 10px); right:10px; z-index:50; }
  .map-legend{ display:none; }

  /* backdrop */
  #mob-backdrop{
    display:block; position:fixed; inset:0; z-index:149;
    background:rgba(0,0,0,.5); opacity:0; pointer-events:none;
    transition:opacity .28s ease;
  }
  #mob-backdrop.show{ opacity:1; pointer-events:all; }

  /* sidebar — slide-in drawer from left */
  #sidebar{
    position:fixed;
    top:var(--topbar); bottom:var(--tabbar);
    left:0; width:100vw; height:auto;
    border-right:none; border-top:none; border-radius:0;
    box-shadow:6px 0 32px rgba(0,0,0,.2);
    transform:translateX(-100%);
    transition:transform .3s cubic-bezier(.22,1,.36,1);
    z-index:150;
    overflow-y:auto;
    display:flex; flex-direction:column;
  }
  #sidebar.drawer-open{ transform:translateX(0); }
  #sidebar::before{ display:none; }

  /* close row inside drawer */
  .drawer-close-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px 8px; border-bottom:1px solid var(--line); flex-shrink:0;
  }
  .drawer-title{ font-size:15px; font-weight:700; }
  .drawer-close-btn{
    width:30px; height:30px; border-radius:var(--r8);
    background:var(--surface2); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-size:18px; color:var(--ink2); cursor:pointer;
  }

  /* stats compact */
  .stats-strip{ grid-template-columns:repeat(4,1fr); }
  .stat-n{ font-size:16px; }
  .stat-box{ padding:7px 8px; }

  /* detail panel — bottom sheet */
  #detail{
    position:fixed; bottom:var(--tabbar); left:0; right:0; width:100%;
    height:var(--expanded); top:auto;
    border-left:none; border-top:1px solid var(--line);
    border-radius:20px 20px 0 0;
    box-shadow:0 -8px 40px rgba(0,0,0,.18);
    transform:translateY(100%);
    transition:transform .32s cubic-bezier(.22,1,.36,1);
    z-index:160;
  }
  #detail.open{ transform:translateY(calc(var(--expanded) - var(--peek))); }
  #detail.open.expanded{ transform:translateY(0); }

  /* drag handle on detail */
  .dp-head::before{
    content:''; position:absolute; top:8px; left:50%;
    transform:translateX(-50%);
    width:36px; height:4px; background:var(--line2); border-radius:2px;
  }
  .dp-head{ position:relative; }
}
</style>
</head>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
const S = {
  vehicles:[], alerts:[], tab:'all', filterRoute:null,
  selectedId:null, selectedStop:null,
  mode:'list', // list | stop | alerts | nearby
  followMode:false,
  tripCache:{}, shapeCache:{},
  shapeLayer:null, userLayer:null,
  userPos:null,           // {lat,lon} for nearby stops
  nearbyStops:[],         // [{stopId,name,code,lat,lon,dist,routes}]
  prevPositions:{},
  prevStopSeq:{},
  etaTimer:null,          // setInterval for countdown ticking
  etaTargets:{},          // key→{el, isoTime} for live ticking
  favs: (() => { try { return JSON.parse(localStorage.getItem('adl_favs3')||'[]'); } catch { return []; }})(),
};
const saveFavs = () => localStorage.setItem('adl_favs3', JSON.stringify(S.favs));

// ═══════════════════════════════════════
// ETA COUNTDOWN ENGINE
// ═══════════════════════════════════════
// Returns minutes until an ISO datetime (negative = overdue)
function minsUntil(iso) {
  if (!iso) return null;
  return (new Date(iso) - Date.now()) / 60000;
}

// Formats minutes into a human countdown string
function fmtCountdown(mins) {
  if (mins === null) return null;
  if (mins < -1)   return { text: 'Due', cls: 'due',    color: '#c62828' };
  if (mins < 0.5)  return { text: 'Now', cls: 'urgent', color: '#e65100' };
  if (mins < 2)    return { text: `${Math.round(mins * 60)}s`,  cls: 'urgent', color: '#e65100' };
  if (mins < 60)   return { text: `${Math.floor(mins)}m`,       cls: mins < 8 ? 'soon' : 'later', color: mins < 8 ? '#2e7d32' : 'var(--ink2)' };
  const h = Math.floor(mins / 60), m = Math.round(mins % 60);
  return { text: m > 0 ? `${h}h ${m}m` : `${h}h`, cls: 'later', color: 'var(--ink3)' };
}

// Build an ETA pill element string for a realtime ISO time + scheduled fallback
function etaPill(realtimeIso, scheduledStr, delay) {
  const mins = minsUntil(realtimeIso);
  const cd   = mins !== null ? fmtCountdown(mins) : null;
  const delayInfo = fmtDelay(delay);

  if (cd) {
    // Register this element for live ticking — we use a data attr as key
    const key = `eta-${realtimeIso}`;
    S.etaTargets[key] = { iso: realtimeIso };
    return `<div style="text-align:right">
      <div class="eta-pill ${cd.cls}" data-eta="${key}">${cd.text}</div>
      ${scheduledStr ? `<div class="eta-sched">${scheduledStr}</div>` : ''}
      ${delayInfo ? `<div class="dep-delay ${delayInfo.cls}">${delayInfo.label}</div>` : ''}
    </div>`;
  }
  // Fallback to static time
  return `<div style="text-align:right">
    ${scheduledStr ? `<div class="dep-sched">${scheduledStr}</div>` : ''}
    ${delayInfo ? `<div class="dep-delay ${delayInfo.cls}">${delayInfo.label}</div>` : ''}
  </div>`;
}

// Tick all registered ETA elements every second
function startEtaTicker() {
  if (S.etaTimer) clearInterval(S.etaTimer);
  S.etaTimer = setInterval(() => {
    const els = document.querySelectorAll('[data-eta]');
    els.forEach(el => {
      const key = el.dataset.eta;
      const target = S.etaTargets[key];
      if (!target) return;
      const mins = minsUntil(target.iso);
      const cd   = fmtCountdown(mins);
      if (!cd) return;
      el.textContent = cd.text;
      el.className   = `eta-pill ${cd.cls}`;
    });
  }, 1000);
}

// Stop ticker and clear targets when rebuilding DOM
function resetEtaTargets() {
  S.etaTargets = {};
}

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
const DIRS = ['N','NE','E','SE','S','SW','W','NW'];
const bearDir = b => DIRS[Math.round(((b||0)+360)/45)%8];
const fmtTime = iso => { try { return new Date(iso).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',timeZone:'Australia/Adelaide'}); } catch{ return '—'; }};
const fmtDelay = sec => {
  if (!sec) return null;
  const m = Math.round(sec/60);
  if (m===0) return {label:'On time',cls:'ontime',color:'var(--ok)'};
  if (m>0)   return {label:`+${m} min`,cls:'late',color:'var(--danger)'};
  return {label:`${Math.abs(m)} min early`,cls:'early',color:'var(--ok)'};
};
const vColor = (type, speed) => type==='tram'?'#00897b':type==='train'?'#3949ab':speed>0.5?'#e65100':'#78909c';
const vBg    = (type, speed) => type==='tram'?'#e0f5f2':type==='train'?'#e8eaf6':speed>0.5?'#fff3e0':'#eceff1';

const CROWD = {
  0:{label:'Empty',           emoji:'🟢',pct:5,   color:'var(--crowd-low)'},
  1:{label:'Many seats',      emoji:'🟢',pct:20,  color:'var(--crowd-low)'},
  2:{label:'Few seats left',  emoji:'🟡',pct:55,  color:'var(--crowd-mid)'},
  3:{label:'Standing room',   emoji:'🟠',pct:78,  color:'var(--crowd-mid)'},
  4:{label:'Very crowded',    emoji:'🔴',pct:92,  color:'var(--crowd-high)'},
  5:{label:'Full',            emoji:'🔴',pct:100, color:'var(--crowd-high)'},
  6:{label:'Not accepting',   emoji:'⛔',pct:100, color:'var(--crowd-high)'},
};

// ═══════════════════════════════════════
// MAP
// ═══════════════════════════════════════
const ADELAIDE = [-34.928, 138.600];
const map = L.map('map', { center:ADELAIDE, zoom:12, zoomControl:false, attributionControl:true });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom:19
}).addTo(map);

const markers = {};

function makeIcon(v, sel) {
  const color = vColor(v.routeType, v.speed);
  const label = (v.routeShort||'').substring(0,6);
  const isTram = v.routeType==='tram', isTrain = v.routeType==='train';
  let sz = isTram?28:isTrain?26:v.speed>0.5?20:13;
  if (sel) sz = Math.round(sz*1.4);

  let arrow='';
  if (v.speed>0.5) {
    const a=v.bearing||0, asz=sz+12, mid=asz/2;
    arrow=`<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(${a}deg);pointer-events:none;width:${asz}px;height:${asz}px;overflow:visible"><svg width="${asz}" height="${asz}" viewBox="0 0 ${asz} ${asz}" style="overflow:visible"><polygon points="${mid},2 ${mid-4},10 ${mid+4},10" fill="${color}" opacity="0.7"/></svg></div>`;
  }
  const alertRing = v.alerts?.length ? `<div style="position:absolute;inset:-5px;border-radius:50%;border:2px solid rgba(183,28,28,.6);pointer-events:none"></div>` : '';
  const selRing   = sel ? `<div style="position:absolute;inset:-6px;border-radius:50%;border:2.5px solid ${color};opacity:.4;pointer-events:none"></div>` : '';
  const occBadge  = (isTram && v.occupancy) ? `<div style="position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);font-size:10px;line-height:1;pointer-events:none">${v.occupancy.emoji}</div>` : '';
  const border    = sel ? `border:3px solid white;box-shadow:0 0 0 3px ${color},0 4px 12px rgba(0,0,0,.25)` : `border:2px solid rgba(255,255,255,.92);box-shadow:0 2px 6px rgba(0,0,0,.2)`;
  const showLbl   = isTram||isTrain||sel;
  const fs        = Math.max(7, Math.round(sz/3.2));
  const lbl       = showLbl ? `<span style="font-family:'JetBrains Mono',monospace;font-size:${fs}px;font-weight:600;color:white;line-height:1;text-align:center;max-width:${sz-4}px;overflow:hidden;display:block">${label}</span>` : '';

  const html = `<div style="position:relative;width:${sz}px;height:${sz}px">${selRing}${arrow}${alertRing}<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${color};${border};display:flex;align-items:center;justify-content:center;cursor:pointer">${lbl}</div>${occBadge}</div>`;
  return L.divIcon({ html, className:'', iconSize:[sz,sz], iconAnchor:[sz/2,sz/2] });
}

// Smooth interpolation between two GPS positions over `ms` milliseconds
function animateMarkerTo(marker, toLat, toLon, ms) {
  const el = marker.getElement();
  if (!el) { marker.setLatLng([toLat, toLon]); return; }

  const from = marker.getLatLng();
  const dLat = toLat - from.lat;
  const dLon = toLon - from.lng;
  if (Math.abs(dLat) < 0.000005 && Math.abs(dLon) < 0.000005) return; // no meaningful movement

  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / ms, 1);
    // Ease in-out cubic
    const e = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
    marker.setLatLng([from.lat + dLat*e, from.lng + dLon*e]);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function updateMarkers() {
  const filteredSet = new Set(getFiltered().map(v=>v.vehicleId));
  const seen = new Set();

  S.vehicles.forEach(v => {
    if (!v.lat||!v.lon) return;
    seen.add(v.vehicleId);
    const sel = v.vehicleId===S.selectedId;
    const vis = filteredSet.has(v.vehicleId);
    const icon = makeIcon(v, sel);
    const zi = v.routeType==='tram'?200:v.routeType==='train'?100:0;

    // Follow mode: selected vehicle stays bright, everything else fades away
    const opacity = sel ? 1 : S.followMode ? 0.05 : vis ? 1 : 0.07;

    if (markers[v.vehicleId]) {
      const m = markers[v.vehicleId];
      if (v.speed > 0.5) {
        animateMarkerTo(m, v.lat, v.lon, 900);
      } else {
        m.setLatLng([v.lat, v.lon]);
      }
      m.setIcon(icon);
      m.setOpacity(opacity);
      m.setZIndexOffset(sel ? 900 : zi);
    } else {
      const m = L.marker([v.lat,v.lon], {icon, opacity, zIndexOffset:zi});
      m.on('click', () => selectVehicle(v.vehicleId));
      m.addTo(map);
      markers[v.vehicleId] = m;
    }
  });

  Object.keys(markers).forEach(id => {
    if (!seen.has(id)) { markers[id].remove(); delete markers[id]; }
  });
}

function drawShape(shapeId, type) {
  if (S.shapeLayer) { S.shapeLayer.remove(); S.shapeLayer=null; }
  const pts = S.shapeCache[shapeId]; if (!pts?.length) return;
  const color = type==='tram'?'#00897b':type==='train'?'#3949ab':'#e65100';
  S.shapeLayer = L.polyline(pts.map(p=>[p.lat,p.lon]), {color,weight:4,opacity:.65,smoothFactor:1.5}).addTo(map);
}

function resetView() { S.followMode=false; document.getElementById('mc-follow').classList.remove('on'); map.setView(ADELAIDE,12,{animate:true}); }
function toggleFollow() {
  S.followMode = !S.followMode;
  document.getElementById('mc-follow').classList.toggle('on', S.followMode);
  document.getElementById('dp-follow').classList.toggle('on', S.followMode);
  if (S.followMode && S.selectedId) {
    const v = S.vehicles.find(x=>x.vehicleId===S.selectedId);
    if (v) map.setView([v.lat, v.lon], Math.max(map.getZoom(), 15), {animate:true});
  } else if (!S.followMode) {
    // Zoom out slightly when leaving follow mode so context is visible
    if (map.getZoom() > 15) map.setZoom(14, {animate:true});
  }
  // Immediately re-render markers to apply/remove fade
  updateMarkers();
}
function locateMe() {
  if (!navigator.geolocation) { alert('Geolocation not supported'); return; }
  const btn = document.getElementById('mc-locate');
  btn.style.animation = 'spin 1s linear infinite';
  navigator.geolocation.getCurrentPosition(pos => {
    btn.style.animation='';
    btn.classList.add('on');
    const lat=pos.coords.latitude, lon=pos.coords.longitude, acc=pos.coords.accuracy;
    S.userPos={lat,lon};
    if (S.userLayer) { S.userLayer.remove(); S.userLayer=null; }
    const circle = L.circle([lat,lon],{radius:acc,color:'#2196f3',fillColor:'#2196f3',fillOpacity:.1,weight:1.5});
    const dot    = L.divIcon({html:'<div class="user-dot"></div>',className:'',iconSize:[14,14],iconAnchor:[7,7]});
    S.userLayer  = L.layerGroup([circle, L.marker([lat,lon],{icon:dot})]).addTo(map);
    map.setView([lat,lon],15,{animate:true});
    showNearby();
  }, err => { btn.style.animation=''; alert('Location error: '+err.message); });
}

// Haversine distance in metres
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000,φ1=lat1*Math.PI/180,φ2=lat2*Math.PI/180;
  const Δφ=(lat2-lat1)*Math.PI/180,Δλ=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(Δφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
const fmtDist = m => m<1000?`${Math.round(m)}m`:`${(m/1000).toFixed(1)}km`;
const walkMins= m => { const n=Math.round(m/80); return n<1?'< 1 min walk':`${n} min walk`; };

async function showNearby() {
  if (!S.userPos) { locateMe(); return; }
  S.mode='nearby'; S.selectedStop=null; S.selectedId=null;
  document.getElementById('detail').classList.remove('open');
  document.getElementById('mc-nearby').classList.add('on');
  const scroll=document.getElementById('sb-scroll');
  scroll.innerHTML=`<div class="empty"><div class="empty-i" style="animation:spin 1s linear infinite;display:inline-block">📍</div><div class="empty-t">Finding nearby stops…</div></div>`;
  try {
    const res  = await fetch(`/api/stops/nearby?lat=${S.userPos.lat}&lon=${S.userPos.lon}&radius=800`);
    const data = await res.json();
    const stops=(data.stops||[])
      .map(s=>({...s,dist:haversine(S.userPos.lat,S.userPos.lon,s.lat,s.lon)}))
      .filter(s=>s.dist<=800).sort((a,b)=>a.dist-b.dist).slice(0,25);
    S.nearbyStops=stops;
    renderNearby(scroll);
  } catch(e) {
    scroll.innerHTML=`<div class="empty"><div class="empty-i">⚠️</div><div class="empty-t">Could not load nearby stops</div></div>`;
  }
}

function renderNearby(scroll) {
  const stops=S.nearbyStops;
  const hdr=`<div class="nearby-hdr"><div class="nearby-hdr-row"><button class="stop-back" onclick="closeNearby()">←</button><div><div class="nearby-title">Nearby stops</div><div class="nearby-sub">${stops.length} stops within 800m</div></div></div></div>`;
  if (!stops.length) { scroll.innerHTML=hdr+`<div class="empty"><div class="empty-i">🔍</div><div class="empty-t">No stops found nearby</div></div>`; return; }
  const rows=stops.map((s,i)=>{
    const icon=s.routeTypes?.includes('tram')?'🚊':s.routeTypes?.includes('train')?'🚆':'🚌';
    return `<div class="nearby-row" onclick="pickStop(${JSON.stringify({stopId:s.stopId,name:s.name,code:s.code,lat:s.lat,lon:s.lon}).replace(/"/g,'&quot;')})" style="animation:fadeUp .12s both;animation-delay:${i*.03}s">
      <div class="nearby-dot">${icon}</div>
      <div class="nearby-body"><div class="nearby-name">${s.name}</div><div class="nearby-meta">Stop ${s.code||s.stopId} · ${walkMins(s.dist)}</div></div>
      <div class="nearby-dist">${fmtDist(s.dist)}</div>
    </div>`;
  }).join('');
  scroll.innerHTML=hdr+rows;
}

function closeNearby() {
  S.mode='list'; S.nearbyStops=[];
  document.getElementById('mc-nearby').classList.remove('on');
  renderSidebar();
}


// FILTER + TABS
// ═══════════════════════════════════════
function getFiltered() {
  return S.vehicles.filter(v => {
    if (S.filterRoute) return v.routeShort===S.filterRoute;
    if (S.tab==='tram')   return v.routeType==='tram';
    if (S.tab==='train')  return v.routeType==='train';
    if (S.tab==='bus')    return v.routeType==='bus';
    if (S.tab==='alerts') return v.alerts?.length>0;
    return true;
  });
}

function setTab(t, el) {
  S.tab=t; S.filterRoute=null;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  S.mode = t==='alerts'?'alerts':'list';
  S.selectedStop=null;
  renderSidebar(); updateMarkers();
  // On mobile, snap sidebar to peek so user sees both map and list
  mobilePeekSidebar();
}

// ═══════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════
function renderSidebar() {
  // Update tab counts
  const ct = {all:S.vehicles.length,tram:0,train:0,bus:0,alerts:0};
  S.vehicles.forEach(v => { ct[v.routeType]&&ct[v.routeType]++; if(v.alerts?.length) ct.alerts++; });
  Object.keys(ct).forEach(k => { const el=document.getElementById(`tc-${k}`); if(el) el.textContent=ct[k]; });

  // Stats
  document.getElementById('s-total').textContent  = S.vehicles.length;
  document.getElementById('s-moving').textContent = S.vehicles.filter(v=>v.speed>0.5).length;
  document.getElementById('s-tram').textContent   = ct.tram;
  document.getElementById('s-train').textContent  = ct.train;

  const scroll = document.getElementById('sb-scroll');
  if (S.mode==='stop' && S.selectedStop) { renderStopBoard(scroll); return; }
  if (S.mode==='alerts') { renderAlerts(scroll); return; }
  renderVList(scroll);
}

function renderVList(scroll) {
  const fv = getFiltered();
  if (!fv.length) {
    scroll.innerHTML = `<div class="empty"><div class="empty-i">🔍</div><div class="empty-t">No vehicles</div></div>`;
    return;
  }
  const to = {tram:0,train:1,bus:2};
  const sorted = [...fv].sort((a,b) => {
    const fa=S.favs.includes(a.vehicleId)?0:1, fb=S.favs.includes(b.vehicleId)?0:1;
    if (fa!==fb) return fa-fb;
    if (to[a.routeType]!==to[b.routeType]) return to[a.routeType]-to[b.routeType];
    const ma=a.speed>0.5?0:1, mb=b.speed>0.5?0:1;
    if (ma!==mb) return ma-mb;
    return b.speed-a.speed;
  });
  const groups={};
  sorted.forEach(v => {
    const gk = (S.tab==='all'&&!S.filterRoute)?v.routeType:v.routeShort||v.routeType;
    if (!groups[gk]) groups[gk]=[];
    groups[gk].push(v);
  });
  const tc={tram:'var(--tram)',train:'var(--train)',bus:'var(--bus)'};
  const tpb={tram:'var(--tram-lt)',train:'var(--train-lt)',bus:'var(--bus-lt)'};
  const tl={tram:'Trams',train:'Trains',bus:'Buses'};
  const tIcon={tram:'🚊',train:'🚆',bus:'🚌'};

  let html='';
  const gkOrder = Object.keys(groups).sort((a,b)=>{
    const ia=['tram','train','bus'].indexOf(a), ib=['tram','train','bus'].indexOf(b);
    if (ia>-1&&ib>-1) return ia-ib; if (ia>-1) return -1; if (ib>-1) return 1; return a.localeCompare(b);
  });
  gkOrder.forEach(gk => {
    const gvs=groups[gk];
    const isType=['tram','train','bus'].includes(gk);
    const gc  = isType?tc[gk]:vColor(gvs[0].routeType,1);
    const gpb = isType?tpb[gk]:vBg(gvs[0].routeType,1);
    const gl  = isType?tl[gk]:`Route ${gk}`;
    const ico = isType?tIcon[gk]:(tIcon[gvs[0].routeType]||'🚌');
    html += `<div class="vg-hdr" style="color:${gc}">${ico} ${gl} <span class="vg-pill" style="background:${gpb};color:${gc}">${gvs.length}</span></div>`;
    gvs.forEach((v,i) => {
      const sel=v.vehicleId===S.selectedId, fav=S.favs.includes(v.vehicleId);
      const col=vColor(v.routeType,v.speed), bg=vBg(v.routeType,v.speed);
      const spd=v.speed>0.5?`${Math.round(v.speed)} km/h`:'Stopped';
      const spdC=v.speed>0.5?'var(--ok)':'var(--stopped)';
      const occ = v.routeType==='tram'&&v.occupancy ? `<div class="vc-occ">${v.occupancy.emoji} <span>${v.occupancy.label}</span></div>` : '';
      html += `<div class="vcard${sel?' sel':''}" data-t="${v.routeType}" onclick="selectVehicle('${v.vehicleId}')" style="animation:fadeUp .15s both;animation-delay:${i*.012}s">
        <div class="vc-bd" style="background:${bg};color:${col}">${(v.routeShort||'').substring(0,6)}</div>
        <div class="vc-body">
          <div class="vc-name">${v.routeLong||v.routeShort||v.vehicleId}</div>
          <div class="vc-sub"><span>Veh ${v.vehicleId}</span><div class="vc-dot"></div><span>${v.headsign||v.routeShort||'—'}</span></div>
          ${occ}
        </div>
        <div class="vc-right">
          <div class="vc-spd" style="color:${spdC}">${spd}</div>
          <div class="vc-bear">${bearDir(v.bearing)} ${Math.round(v.bearing||0)}°</div>
        </div>
        ${fav?'<div class="vc-fav"></div>':''}
        ${v.alerts?.length?'<div class="vc-alert"></div>':''}
      </div>`;
    });
  });
  scroll.innerHTML=html;
  // Scroll to selected
  const selEl = scroll.querySelector('.vcard.sel');
  if (selEl) setTimeout(()=>selEl.scrollIntoView({block:'nearest',behavior:'smooth'}),80);
}

function renderAlerts(scroll) {
  if (!S.alerts.length) {
    scroll.innerHTML=`<div class="empty"><div class="empty-i">✅</div><div class="empty-t">No active disruptions</div><div class="empty-s">All services running normally</div></div>`;
    return;
  }
  scroll.innerHTML = S.alerts.map(a => `<div class="alerts-list"><div class="alert-card">
    <div class="alert-hd"><div class="alert-ico">⚠️</div><div class="alert-title">${a.header||'Service Alert'}</div></div>
    ${a.description?`<div class="alert-body">${a.description}</div>`:''}
    ${a.routes?.length?`<div class="alert-routes">${a.routes.map(r=>`<span class="alert-rt">⚠ ${r}</span>`).join('')}</div>`:''}
  </div></div>`).join('');
}

async function renderStopBoard(scroll) {
  const stop = S.selectedStop;
  scroll.innerHTML=`<div class="stop-hdr"><div class="stop-hdr-row"><button class="stop-back" onclick="closeStop()">←</button><div><div class="stop-name-big">${stop.name||stop.stopId}</div>${stop.code?`<div class="stop-id-sm">Stop ${stop.code}</div>`:''}</div></div></div><div class="empty"><div class="empty-i" style="animation:spin 1s linear infinite;display:inline-block">⏳</div><div class="empty-t">Loading departures…</div></div>`;
  try {
    const data = await fetch(`/api/stops/${stop.stopId}/departures`).then(r=>r.json());
    if (!data.departures?.length) {
      scroll.innerHTML = `<div class="stop-hdr"><div class="stop-hdr-row"><button class="stop-back" onclick="closeStop()">←</button><div><div class="stop-name-big">${data.stopName||stop.name}</div></div></div></div><div class="empty"><div class="empty-i">🚏</div><div class="empty-t">No departures found</div></div>`;
      return;
    }
    resetEtaTargets();
    let rows='';
    data.departures.forEach((d,i) => {
      const col=vColor(d.routeType,1), bg=vBg(d.routeType,1);
      const occSpan = d.routeType==='tram'&&d.occupancy?`<span title="${d.occupancy.label}" style="margin-left:4px">${d.occupancy.emoji}</span>`:'';
      const timeHtml = etaPill(d.realtimeTime, d.scheduledTime, d.delay);
      rows+=`<div class="dep-row" onclick="${d.vehicleId?`selectVehicleFromStop('${d.vehicleId}')`:''}" style="opacity:${d.vehicleId?1:.65}">
        <div class="dep-bd" style="background:${bg};color:${col}">${(d.routeShort||'').substring(0,6)}</div>
        <div class="dep-body">
          <div class="dep-route">${d.routeLong||d.routeShort||d.routeId}${occSpan}</div>
          <div class="dep-head">${d.headsign?`To: ${d.headsign}`:'Service'}${!d.vehicleId?'<span style="color:var(--ink4);font-size:10px"> · scheduled</span>':''}</div>
        </div>
        ${timeHtml}
      </div>`;
    });
    scroll.innerHTML = `<div class="stop-hdr"><div class="stop-hdr-row"><button class="stop-back" onclick="closeStop()">←</button><div><div class="stop-name-big">${data.stopName||stop.name}</div><div class="stop-id-sm">Stop ${stop.stopId} · next ${data.departures.length} services</div></div></div></div>${rows}`;
  } catch(e) {
    scroll.innerHTML = `<div class="stop-hdr"><div class="stop-hdr-row"><button class="stop-back" onclick="closeStop()">←</button><div><div class="stop-name-big">${stop.name}</div></div></div></div><div class="empty"><div class="empty-i">⚠️</div><div class="empty-t">Failed to load departures</div></div>`;
  }
}
function closeStop() {
  S.selectedStop=null; S.mode='list';
  resetEtaTargets();
  renderSidebar();
}
function selectVehicleFromStop(id) {
  S.mode='list'; S.selectedStop=null;
  selectVehicle(id);
}

function selectVehicle(id) {
  S.selectedId=id; S.selectedStop=null;
  S.mode='list'; S.filterRoute=null;
  // Reset stop tracking so first poll doesn't trigger a spurious re-render
  delete S.prevStopSeq[id];
  const v=S.vehicles.find(x=>x.vehicleId===id);
  if (!v) return;
  renderSidebar(); updateMarkers();
  map.panTo([v.lat,v.lon],{animate:true,duration:.5});

  // Open detail panel
  document.getElementById('dp-title').textContent=`${v.routeShort||'Vehicle'} — ${v.headsign||'Details'}`;
  document.getElementById('dp-fav').textContent = S.favs.includes(id)?'★':'☆';
  document.getElementById('dp-fav').classList.toggle('on',S.favs.includes(id));
  document.getElementById('dp-follow').classList.toggle('on',S.followMode);
  document.getElementById('detail').classList.add('open');
  mobileOpenDetail();
  renderDetailContent(v);
  loadDetailData(v);
}

function closeDetail() {
  S.selectedId = null;
  if (S.followMode) {
    S.followMode = false;
    document.getElementById('mc-follow').classList.remove('on');
  }
  if (S.shapeLayer) { S.shapeLayer.remove(); S.shapeLayer=null; }
  document.getElementById('detail').classList.remove('open','expanded');
  renderSidebar(); updateMarkers();
}

function toggleFav() {
  if (!S.selectedId) return;
  const i=S.favs.indexOf(S.selectedId);
  if (i>-1) S.favs.splice(i,1); else S.favs.push(S.selectedId);
  saveFavs();
  document.getElementById('dp-fav').textContent=S.favs.includes(S.selectedId)?'★':'☆';
  document.getElementById('dp-fav').classList.toggle('on',S.favs.includes(S.selectedId));
  renderSidebar();
}

    <div class="d-hero">
      <div class="d-hero-bd" style="background:${bg};color:${col}">${(v.routeShort||'').substring(0,6)}</div>
      <div style="flex:1;min-width:0">

          ${v.alerts?.length?'<span class="d-chip" style="background:var(--danger-lt);color:var(--danger);border-color:transparent">⚠ Alert</span>':''}

      <div class="kpi"><div class="kpi-v" id="kv-brg">${Math.round(v.bearing||0)}°</div><div class="kpi-l">${bearDir(v.bearing)}</div></div>

async function loadDetailData(v) {
  if (!v.tripId) { const sz=document.getElementById('stops-zone'); if(sz) sz.innerHTML='<div class="empty-t" style="text-align:center;padding:16px;color:var(--ink3)">No trip data</div>'; return; }
  try {
    if (!S.tripCache[v.tripId]) {
      const r=await fetch(`/api/trips/${v.tripId}`); S.tripCache[v.tripId]=await r.json();
    }
    const td=S.tripCache[v.tripId];
    renderStopTimeline(td.stops||[], v.stopSeq||0, v.routeType, td.hasRealtime);
    const ns=(td.stops||[]).find(s=>s.sequence>=(v.stopSeq||0));
    if (ns) {
      const d=fmtDelay(ns.delay);
      const kd=document.getElementById('kv-dly');
      if (kd&&d) { kd.textContent=d.label; kd.style.color=d.color; kd.style.fontSize='13px'; }
    }
    if (v.shapeId) {
      if (!S.shapeCache[v.shapeId]) {
        fetch(`/api/shape/${v.shapeId}`).then(r=>r.json()).then(data => {
          S.shapeCache[v.shapeId]=data.points||[];
          if (S.selectedId===v.vehicleId) drawShape(v.shapeId,v.routeType);
        }).catch(()=>{});
      } else drawShape(v.shapeId,v.routeType);
    }
  } catch(e) { const sz=document.getElementById('stops-zone'); if(sz) sz.innerHTML='<div class="empty-t" style="text-align:center;padding:16px;color:var(--ink3)">Stop data unavailable</div>'; }
}


function renderStopTimelineRows(el, upcoming, type, hasRT) {
  if (!upcoming?.length) { el.innerHTML='<div class="empty-t" style="text-align:center;padding:16px;color:var(--ink3)">End of line</div>'; return; }
  const dc  = type==='tram'?'var(--tram)':type==='train'?'var(--train)':'var(--bus)';
  const dlt = type==='tram'?'var(--tram-lt)':type==='train'?'var(--train-lt)':'var(--bus-lt)';
  let html = '<div class="stop-tl">';
  if (!hasRT) html += '<div style="padding:4px 14px 8px;font-size:10px;color:var(--ink3);display:flex;gap:4px;align-items:center">\u{1F4C5} Scheduled times only</div>';
  upcoming.forEach((s, i) => {
    const isNext = i === 0;
    const rtIso  = s.arrivalTime || s.departureTime;
    const delay  = fmtDelay(s.delay);
    const mins   = minsUntil(rtIso);
    const cd     = mins !== null ? fmtCountdown(mins) : null;
    let timeHtml = '';
    if (isNext && cd) {
      const key = 'eta-tl-' + (rtIso||i);
      S.etaTargets[key] = { iso: rtIso };
      timeHtml = '<span class="eta-pill ' + cd.cls + '" data-eta="' + key + '" style="font-size:11px;padding:2px 7px">' + cd.text + '</span>';
    } else if (rtIso) {
      timeHtml = '<span class="stop-rt" style="color:' + (delay?.color || 'var(--ok)') + '">' + fmtTime(rtIso) + '</span>';
    }
    if (s.scheduledTime && !isNext) timeHtml = '<span class="stop-sched">' + s.scheduledTime + '</span> ' + timeHtml;
    if (delay && !isNext) timeHtml += '<span class="stop-delay ' + delay.cls + '">' + delay.label + '</span>';
    html += '<div class="stop-row">'
      + '<div class="stop-spine"><div class="stop-dot' + (isNext ? ' nxt' : '') + '" style="' + (isNext ? 'background:' + dc + ';border-color:' + dc + ';box-shadow:0 0 0 3px ' + dlt : '') + '"></div>' + (i < upcoming.length-1 ? '<div class="stop-conn"></div>' : '') + '</div>'
      + '<div class="stop-content">'
      + '<div class="stop-nm" style="' + (isNext ? 'color:' + dc + ';font-weight:700' : '') + '">' + (s.stopName||s.stopId) + (isNext ? '<span style="font-size:9px;opacity:.7;margin-left:4px">(next)</span>' : '') + '</div>'
      + '<div class="stop-times">' + timeHtml + '</div>'
      + '</div></div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

function renderStopTimelineDirect(upcoming, type, hasRT) {
  const el = document.getElementById('stops-zone');
  if (el) renderStopTimelineRows(el, upcoming, type, hasRT);
}


function renderStopTimeline(stops, curSeq, type, hasRT) {
  const el = document.getElementById('stops-zone');
  if (!el) return;
  const upcoming = stops.filter(s => (s.sequence || 0) >= (curSeq || 0)).slice(0, 12);
  renderStopTimelineRows(el, upcoming, type, hasRT);
}

// ═══════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════
let searchTimer=null;
document.getElementById('search-in').addEventListener('input', e => {
  const q=e.target.value.trim();
  document.getElementById('search-clear').classList.toggle('show',q.length>0);
  clearTimeout(searchTimer);
  if (q.length<2) { document.getElementById('search-drop').classList.remove('show'); return; }
  searchTimer=setTimeout(()=>doSearch(q),260);
});
document.getElementById('search-in').addEventListener('focus', () => {
  const q=document.getElementById('search-in').value.trim();
  if (q.length>=2) doSearch(q);
});
document.getElementById('search-clear').addEventListener('click', () => {
  document.getElementById('search-in').value='';
  document.getElementById('search-clear').classList.remove('show');
  document.getElementById('search-drop').classList.remove('show');
});
document.addEventListener('click', e => {
  if (!document.getElementById('search-wrap').contains(e.target))
    document.getElementById('search-drop').classList.remove('show');
});

async function doSearch(q) {
  const ql=q.toLowerCase();
  let html='';
  // Stops
  try {
    const data=await fetch(`/api/stops/search?q=${encodeURIComponent(q)}`).then(r=>r.json());
    if (data.stops?.length) {
      html+=`<div class="dd-sec">🚏 Stops</div>`;
      data.stops.forEach(s => {
        html+=`<div class="dd-item" onclick="pickStop(${JSON.stringify(s).replace(/"/g,'&quot;')})">
          <div class="dd-badge" style="background:var(--surface3);color:var(--ink2)">🚏</div>
          <div><div class="dd-name">${s.name}</div><div class="dd-sub">Stop ${s.code||s.stopId}</div></div>
        </div>`;
      });
    }
  } catch {}
  // Routes
  const uniq={};
  S.vehicles.filter(v=>v.routeShort?.toLowerCase().includes(ql)||v.routeLong?.toLowerCase().includes(ql)||v.vehicleId.toLowerCase().includes(ql))
    .forEach(v=>{ if (!uniq[v.routeShort]) uniq[v.routeShort]=v; });
  const rv=Object.values(uniq).slice(0,5);
  if (rv.length) {
    html+=`<div class="dd-sec">🗺 Active Routes</div>`;
    rv.forEach(v => {
      const cnt=S.vehicles.filter(x=>x.routeShort===v.routeShort).length;
      const col=vColor(v.routeType,1), bg=vBg(v.routeType,1);
      const ico=v.routeType==='tram'?'🚊':v.routeType==='train'?'🚆':'🚌';
      html+=`<div class="dd-item" onclick="filterByRoute('${v.routeShort}')">
        <div class="dd-badge" style="background:${bg};color:${col}">${v.routeShort}</div>
        <div><div class="dd-name">${v.routeLong||v.routeShort}</div><div class="dd-sub">${ico} ${v.routeType} · ${cnt} vehicle${cnt!==1?'s':''} active</div></div>
      </div>`;
    });
  }
  if (!html) html=`<div class="dd-empty">No results for "${q}"</div>`;
  document.getElementById('search-drop').innerHTML=html;
  document.getElementById('search-drop').classList.add('show');
}

function pickStop(stopObj) {
  document.getElementById('search-in').value='';
  document.getElementById('search-clear').classList.remove('show');
  document.getElementById('search-drop').classList.remove('show');
  S.selectedStop=stopObj; S.mode='stop'; S.selectedId=null;
  document.getElementById('detail').classList.remove('open');
  renderSidebar();
  if (stopObj.lat&&stopObj.lon) map.panTo([stopObj.lat,stopObj.lon],{animate:true});
}
function filterByRoute(rs) {
  document.getElementById('search-in').value='';
  document.getElementById('search-clear').classList.remove('show');
  document.getElementById('search-drop').classList.remove('show');
  S.filterRoute=rs; S.tab='all'; S.mode='list'; S.selectedStop=null;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  document.querySelector('.tab-btn[data-t="all"]').classList.add('on');
  renderSidebar(); updateMarkers();
}

// ═══════════════════════════════════════
// DATA FETCH
// ═══════════════════════════════════════
async function fetchVehicles() {
  try {
    const data=await fetch('/api/vehicles').then(r=>r.json());
    S.vehicles=data.vehicles||[];
    if (data.timestamp) {
      document.getElementById('feed-time').textContent=new Date(data.timestamp).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',timeZone:'Australia/Adelaide'});
    }
    // Live update detail panel if open
    if (S.selectedId) {
      const sv=S.vehicles.find(x=>x.vehicleId===S.selectedId);
      if (sv) {
        // ── Update KPIs ──
        const la=document.getElementById('gv-lat'); if(la) la.textContent=sv.lat.toFixed(6);
        const lo=document.getElementById('gv-lon'); if(lo) lo.textContent=sv.lon.toFixed(6);
        const ks=document.getElementById('kv-spd'); if(ks){ks.textContent=sv.speed>0.5?Math.round(sv.speed):'0';ks.style.color=sv.speed>0.5?'var(--ok)':'var(--stopped)';}
        const kb=document.getElementById('kv-brg'); if(kb) kb.textContent=Math.round(sv.bearing||0)+'°';

        // ── Update crowd bar (trams) ──
        if (sv.routeType==='tram'&&sv.occupancy) {
          const cf=document.querySelector('.crowd-fill');
          const cr=document.querySelector('.crowd-row');
          const oi=CROWD[sv.occupancy.status]||{pct:0,label:'Unknown',emoji:'⬜',color:'var(--ink3)'};
          if(cf){cf.style.width=oi.pct+'%';cf.style.background=oi.color;}
          if(cr) cr.innerHTML=`<span style="font-size:18px">${oi.emoji}</span><span>${oi.label}</span><span>${oi.pct}% full</span>`;
        }

        // ── Auto-update stop timeline on every poll when detail is open ──
        // The server now sends pre-filtered upcomingStops so we use those directly
        // rather than re-filtering the cached full trip — this always stays current
        const currSeq = sv.stopSeq || 0;
        const prevSeq = S.prevStopSeq[S.selectedId];

        // Re-render timeline if: seq changed, OR upcomingStops changed (server filtered by time)
        const stopsChanged = prevSeq !== currSeq ||
          (sv.upcomingStops?.length && sv.upcomingStops[0]?.stopId !== S.prevFirstStopId);

        if (stopsChanged) {
          if (sv.upcomingStops?.length) {
            // Use the pre-filtered stops from the server directly
            renderStopTimelineDirect(sv.upcomingStops, sv.routeType, !!sv.upcomingStops[0]?.arrivalTime);
            const sz = document.getElementById('stops-zone');
            if (sz && prevSeq !== undefined) {
              sz.style.opacity='0.4';
              setTimeout(()=>sz.style.opacity='1', 300);
            }
          } else if (S.tripCache[sv.tripId]) {
            const td = S.tripCache[sv.tripId];
            renderStopTimeline(td.stops||[], currSeq, sv.routeType, td.hasRealtime);
          }
          S.prevFirstStopId = sv.upcomingStops?.[0]?.stopId;

          // Update delay KPI from first upcoming stop
          const ns = sv.upcomingStops?.[0];
          if (ns?.delay) {
            const d = fmtDelay(ns.delay);
            const kd = document.getElementById('kv-dly');
            if (kd && d) { kd.textContent=d.label; kd.style.color=d.color; kd.style.fontSize='13px'; }
          }
        }
        S.prevStopSeq[S.selectedId] = currSeq;


        if (S.followMode) map.panTo([sv.lat,sv.lon],{animate:true,duration:.4});
      }
    }
    if (S.mode!=='stop') renderSidebar();
    updateMarkers();
  } catch(e) { console.error('[Vehicles]',e.message); }
}
async function fetchAlerts() {
  try {
    const data=await fetch('/api/alerts').then(r=>r.json());
    S.alerts=data.alerts||[];
    document.getElementById('tc-alerts').textContent=S.alerts.length;
    if (S.mode==='alerts') renderSidebar();
  } catch(e) { console.error('[Alerts]',e.message); }
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
// ═══════════════════════════════════════
// MOBILE DRAWER + SHEET BEHAVIOUR
// ═══════════════════════════════════════
function isMobile() { return window.innerWidth <= 680; }

function mobDrawerOpen() {
  if (!isMobile()) return;
  document.getElementById('sidebar').classList.add('drawer-open');
  document.getElementById('mob-backdrop').classList.add('show');
  document.getElementById('mob-hamburger').classList.add('open');
}

function mobDrawerClose() {
  if (!isMobile()) return;
  document.getElementById('sidebar').classList.remove('drawer-open');
  document.getElementById('mob-backdrop').classList.remove('show');
  document.getElementById('mob-hamburger').classList.remove('open');
}

function mobDrawerToggle() {
  if (!isMobile()) return;
  const open = document.getElementById('sidebar').classList.contains('drawer-open');
  open ? mobDrawerClose() : mobDrawerOpen();
}

// Selecting a vehicle on mobile closes the drawer and opens detail sheet
function mobileOpenDetail() {
  if (!isMobile()) return;
  mobDrawerClose();
  const detail = document.getElementById('detail');
  detail.classList.remove('expanded'); // start at peek height
}

// Tapping a tab on mobile closes drawer, keeps map visible
function mobilePeekSidebar() {
  if (!isMobile()) return;
  mobDrawerClose();
}

// Detail sheet drag — swipe up to expand, down to peek
function setupDetailDrag() {
  const el = document.getElementById('detail');
  let startY=0, startT=0, dragging=false;

  function onStart(e) {
    const rect = el.getBoundingClientRect();
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    if (clientY - rect.top > 56) return; // only drag from handle area
    startY=clientY; startT=Date.now(); dragging=true;
    el.style.transition='none';
  }
  function onEnd(e) {
    if (!dragging) return;
    dragging=false; el.style.transition='';
    const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
    const dy = clientY - startY;
    const vel = Math.abs(dy) / Math.max(Date.now()-startT, 1);
    if (Math.abs(dy) < 8) { el.classList.toggle('expanded'); return; }
    if (dy < -30 || vel > 0.35) el.classList.add('expanded');
    else if (dy > 30 || vel > 0.35) el.classList.remove('expanded');
  }
  el.addEventListener('touchstart', onStart, {passive:true});
  el.addEventListener('touchend', onEnd);
  el.addEventListener('mousedown', onStart);
  window.addEventListener('mouseup', onEnd);
}

function initMobileSheets() {
  if (!isMobile()) return;
  setupDetailDrag();
  // Tapping map closes drawer and collapses detail to peek
  map.on('click', () => {
    if (!isMobile()) return;
    mobDrawerClose();
    document.getElementById('detail').classList.remove('expanded');
  });
}

async function init() {
  const msg=document.getElementById('ld-msg');
  const msgs=['Connecting to server…','Downloading GTFS timetable…','Loading stops & routes…','Almost ready…'];
  let mi=0;
  const msgT=setInterval(()=>{ mi=Math.min(mi+1,msgs.length-1); msg.textContent=msgs[mi]; },3000);
  try {
    let ready=false;
    for (let i=0;i<30&&!ready;i++) {
      try { const s=await fetch('/api/status').then(r=>r.json()); if(s.staticLoaded) ready=true; } catch {}
      if (!ready) await new Promise(r=>setTimeout(r,2000));
    }
  } catch {}
  clearInterval(msgT);
  msg.textContent='Loading live vehicles…';
  await Promise.all([fetchVehicles(), fetchAlerts()]);
  const ls=document.getElementById('loading-screen');
  ls.classList.add('fade');
  setTimeout(()=>ls.remove(),500);
  startEtaTicker();
  initMobileSheets();
  setInterval(fetchVehicles,15_000);
  setInterval(fetchAlerts,5*60_000);
}
init();
