<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f2f4fb" id="theme-color-meta">
<title>Adelaide Metro</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<div id="loading-screen">
  <div class="ld-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 7v5l3 3"/><path d="M6 12H4M20 12h-2"/></svg></div>
  <div class="ld-title">Adelaide Metro</div>
  <div class="ld-sub">Live Transit Tracker</div>
  <div class="ld-bar-wrap"><div class="ld-bar"></div></div>
  <div class="ld-msg" id="ld-msg">Connecting...</div>
</div>

<div id="action-feedback" aria-live="polite" aria-hidden="true">
  <div class="af-card">
    <div class="af-spinner"></div>
    <div class="af-text" id="action-feedback-text">Working...</div>
  </div>
</div>

<div id="map"></div>

<div id="topbar">
  <div class="tb-logo">
    <div class="tb-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 7v5l3 3"/><path d="M6 12H4M20 12h-2"/></svg></div>
    <div><div class="tb-name">Adelaide Metro</div><div class="tb-sub">Live Tracker</div></div>
  </div>
  <div class="search-wrap" id="search-wrap">
    <div class="search-row">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input id="search-in" type="text" placeholder="Search stop, route or vehicle..." autocomplete="off" aria-label="Search stops, routes, or vehicles">
      <button class="search-clear" id="search-clear" aria-label="Clear search">×</button>
    </div>
    <div class="search-drop" id="search-drop"></div>
  </div>
  <div class="tb-actions">
    <button class="tb-toggle" id="planner-toggle" onclick="openPlanner()" aria-label="Open trip planner" title="Open trip planner">⇄</button>
    <button class="tb-toggle" id="favorites-toggle" onclick="openFavorites()" aria-label="Open favorites" title="Open favorites">★</button>
    <button class="tb-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle night view" aria-pressed="false" title="Toggle day/night view">☾</button>
    <div class="live-pill"><div class="live-dot"></div><span id="feed-time">LIVE</span></div>
  </div>
  <!-- Hamburger — mobile only -->
  <button id="mob-hamburger" onclick="mobDrawerToggle()" aria-label="Open vehicle list" aria-controls="sidebar" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</div>

<!-- Drawer backdrop -->
<div id="mob-backdrop" onclick="mobDrawerClose()" aria-hidden="true"></div>

<div class="map-ctrl">
  <button class="mc-btn" id="mc-locate" onclick="locateMe()" title="My location" aria-label="Center on my location">📍</button>
  <button class="mc-btn" id="mc-nearby" onclick="showNearby()" title="Nearby stops" aria-label="Show nearby stops">🚏</button>
  <button class="mc-btn" id="mc-follow" onclick="toggleFollow()" title="Follow vehicle" aria-label="Toggle follow selected vehicle" aria-pressed="false">◎</button>
  <button class="mc-btn" onclick="resetView()" title="Reset" aria-label="Reset map view" style="font-size:13px">⊙</button>
</div>

<div class="map-legend">
  <div class="leg-row"><div class="leg-dot" style="background:var(--tram)"></div>Tram</div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--train)"></div>Train</div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--bus)"></div>Bus · moving</div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--stopped)"></div>Bus · stopped</div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--danger);opacity:.7"></div>Alert</div>
</div>

<div id="sidebar">
  <!-- Drawer header — visible on mobile only -->
  <div class="drawer-close-row">
    <div class="drawer-title">🚌 Vehicles</div>
    <button class="drawer-close-btn" onclick="mobDrawerClose()" aria-label="Close vehicle list">✕</button>
  </div>
  <div class="drawer-tabs" aria-label="Filter vehicles">
    <div class="drawer-tab-grid">
      <button class="drawer-tab-btn on" data-t="all" onclick="setTab('all',this)" aria-pressed="true">
        <span class="drawer-tab-icon">🗺️</span>
        <span>All</span>
        <span class="drawer-tab-count" data-count="all">0</span>
      </button>
      <button class="drawer-tab-btn" data-t="tram" onclick="setTab('tram',this)" aria-pressed="false">
        <span class="drawer-tab-icon">🚊</span>
        <span>Trams</span>
        <span class="drawer-tab-count" data-count="tram">0</span>
      </button>
      <button class="drawer-tab-btn" data-t="train" onclick="setTab('train',this)" aria-pressed="false">
        <span class="drawer-tab-icon">🚆</span>
        <span>Trains</span>
        <span class="drawer-tab-count" data-count="train">0</span>
      </button>
      <button class="drawer-tab-btn" data-t="bus" onclick="setTab('bus',this)" aria-pressed="false">
        <span class="drawer-tab-icon">🚌</span>
        <span>Buses</span>
        <span class="drawer-tab-count" data-count="bus">0</span>
      </button>
      <button class="drawer-tab-btn" data-t="alerts" onclick="setTab('alerts',this)" aria-pressed="false">
        <span class="drawer-tab-icon">⚠️</span>
        <span>Alerts</span>
        <span class="drawer-tab-count" data-count="alerts">0</span>
      </button>
    </div>
  </div>
  <div class="sb-scroll" id="sb-scroll">
    <div class="empty"><div class="empty-i">🚌</div><div class="empty-t">Loading vehicles...</div></div>
  </div>
</div>

<div id="detail">
  <div class="dp-head">
    <div class="dp-title" id="dp-title">Details</div>
  </div>
  <div class="dp-scroll" id="dp-scroll"><div id="dp-content"></div></div>
</div>

<div id="tabbar">
  <button class="tab-btn on" data-t="all" onclick="setTab('all',this)" aria-pressed="true"><span class="tab-icon">🗺️</span><span>All</span><span class="tab-ct" id="tc-all">0</span></button>
  <button class="tab-btn" data-t="tram" onclick="setTab('tram',this)" aria-pressed="false"><span class="tab-icon">🚊</span><span>Trams</span><span class="tab-ct" id="tc-tram">0</span></button>
  <button class="tab-btn" data-t="train" onclick="setTab('train',this)" aria-pressed="false"><span class="tab-icon">🚆</span><span>Trains</span><span class="tab-ct" id="tc-train">0</span></button>
  <button class="tab-btn" data-t="bus" onclick="setTab('bus',this)" aria-pressed="false"><span class="tab-icon">🚌</span><span>Buses</span><span class="tab-ct" id="tc-bus">0</span></button>
  <button class="tab-btn" data-t="alerts" onclick="setTab('alerts',this)" aria-pressed="false"><span class="tab-icon">⚠️</span><span>Alerts</span><span class="tab-ct" id="tc-alerts">0</span></button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/app.js" defer></script>
</body>
</html>
