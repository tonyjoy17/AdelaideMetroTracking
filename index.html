<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f2f4fb" id="theme-color-meta">
<title>Adelaide Metro</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef3fb;--surface:rgba(255,255,255,.65);--surface2:rgba(255,255,255,.5);--surface3:rgba(255,255,255,.4);
  --glass:rgba(255,255,255,.65);--glass-strong:rgba(255,255,255,.8);
  --ink:#0F172A;--ink2:#334155;--ink3:#64748B;--ink4:#94A3B8;
  --line:rgba(148,163,184,.25);--line2:rgba(100,116,139,.35);
  --tram:#E53935;--tram-lt:#FFEBEE;--tram-mid:#EF9A9A;--tram-glow:rgba(229,57,53,.25);
  --train:#0288D1;--train-lt:#E1F5FE;--train-mid:#81D4FA;--train-glow:rgba(2,136,209,.2);
  --bus:#FF8F00;--bus-lt:#FFF8E1;--bus-mid:#FFC107;--bus-glow:rgba(255,143,0,.2);
  --stopped:#64748B;--stopped-lt:#F1F5F9;
  --ok:#10B981;--ok-lt:#D1FAE5;
  --warn:#F59E0B;--warn-lt:#FEF3C7;
  --danger:#EF4444;--danger-lt:#FEE2E2;
  --fav:#EC4899;--fav-lt:#FCE7F3;
  --crowd-low:#10B981;--crowd-mid:#F59E0B;--crowd-high:#EF4444;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;
  --sh0:0 1px 2px rgba(15,23,42,.06);
  --sh1:0 10px 30px rgba(15,23,42,.08),0 2px 8px rgba(15,23,42,.06);
  --sh2:0 20px 50px rgba(15,23,42,.12),0 6px 18px rgba(15,23,42,.08);
  --sh3:0 28px 70px rgba(15,23,42,.18),0 10px 28px rgba(15,23,42,.08);
  --font:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --topbar:64px;--sidebar:360px;--tabbar:60px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;height:100%;overflow:hidden}
body{font-family:var(--font);color:var(--ink);background:
  radial-gradient(circle at top left, rgba(0,137,123,.14), transparent 28%),
  radial-gradient(circle at top right, rgba(57,73,171,.16), transparent 30%),
  linear-gradient(180deg, #f7fbff 0%, #eef3fb 44%, #e6edf8 100%);
  -webkit-font-smoothing:antialiased}
body::before,body::after{content:'';position:fixed;pointer-events:none;z-index:1}
body::before{inset:auto auto -120px -120px;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle, rgba(0,137,123,.12), transparent 70%)}
body::after{inset:70px -100px auto auto;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle, rgba(57,73,171,.12), transparent 72%)}
body.theme-night{
  --bg:#0F172A;--surface:rgba(30,41,59,.75);--surface2:rgba(30,41,59,.4);--surface3:rgba(51,65,85,.5);
  --glass:rgba(15,23,42,.65);--glass-strong:rgba(15,23,42,.85);
  --ink:#F8FAFC;--ink2:#E2E8F0;--ink3:#94A3B8;--ink4:#64748B;
  --line:rgba(148,163,184,.15);--line2:rgba(148,163,184,.25);
  --stopped:#64748B;--stopped-lt:rgba(51,65,85,.6);
  --ok-lt:rgba(16,185,129,.15);--warn-lt:rgba(245,158,11,.15);--danger-lt:rgba(239,68,68,.15);--fav-lt:rgba(236,72,153,.15);
  --sh0:0 1px 2px rgba(0,0,0,.4);
  --sh1:0 10px 30px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.4);
  --sh2:0 20px 50px rgba(0,0,0,.6),0 6px 18px rgba(0,0,0,.5);
  --sh3:0 28px 70px rgba(0,0,0,.7),0 10px 28px rgba(0,0,0,.6);
  background:
    radial-gradient(circle at top left, rgba(2,136,209,.15), transparent 35%),
    radial-gradient(circle at top right, rgba(229,57,53,.15), transparent 35%),
    linear-gradient(180deg, #0B1120 0%, #0F172A 50%, #020617 100%);
}
body.theme-night::before{background:radial-gradient(circle, rgba(2,136,209,.15), transparent 72%)}
body.theme-night::after{background:radial-gradient(circle, rgba(229,57,53,.15), transparent 72%)}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit;outline:none;-webkit-tap-highlight-color:transparent}
input{border:none;background:none;font:inherit;color:inherit;outline:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}
.leaflet-control-attribution{font-size:9px!important}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes loadBar{0%{width:0;margin-left:0}50%{width:65%;margin-left:0}100%{width:0;margin-left:100%}}

/* Smooth vehicle movement — Uber style */
.leaflet-marker-icon { transition: transform 0.9s cubic-bezier(0.25,0.46,0.45,0.94) !important; }
.leaflet-marker-icon.no-transition { transition: none !important; }

/* â”€â”€ LOADING â”€â”€ */
#loading-screen{position:fixed;inset:0;z-index:9999;background:
  radial-gradient(circle at top, rgba(0,137,123,.16), transparent 32%),
  linear-gradient(180deg, #f9fbff 0%, #eef3fb 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .45s}
#loading-screen.fade{opacity:0;pointer-events:none}
.ld-icon{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,var(--tram),#00bcd4);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 28px rgba(0,137,123,.35);animation:bounce 1.3s ease-in-out infinite}
.ld-icon svg{width:30px;height:30px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.ld-title{font-size:22px;font-weight:800;letter-spacing:-.3px}
.ld-sub{font-size:14px;color:var(--ink3);font-weight:500}
.ld-bar-wrap{width:150px;height:3px;background:var(--line);border-radius:3px;overflow:hidden}
.ld-bar{height:100%;background:var(--tram);border-radius:3px;animation:loadBar 1.8s ease-in-out infinite}
.ld-msg{font-size:11px;color:var(--ink4);font-family:var(--mono)}

/* â”€â”€ TOPBAR â”€â”€ */
#topbar{position:absolute;top:12px;left:12px;right:12px;z-index:100;height:var(--topbar);display:flex;align-items:center;gap:12px;padding:0 16px;background:rgba(255,255,255,.65);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,.5);border-radius:26px;box-shadow:var(--sh2)}
.tb-logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.tb-icon{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,var(--tram),#FF8A65);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 24px rgba(229,57,53,.3)}
.tb-icon svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.tb-name{font-size:17px;font-weight:800;letter-spacing:-.4px}
.tb-sub{font-size:10px;color:var(--ink3);font-weight:600;letter-spacing:.12em;text-transform:uppercase}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(16,185,129,.12);color:var(--ok);border:1px solid rgba(16,185,129,.2);border-radius:999px;padding:6px 12px;font-size:11px;font-weight:800;flex-shrink:0}
.live-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s ease-in-out infinite}
.tb-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-toggle{width:38px;height:38px;border-radius:14px;background:var(--surface2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .18s}
.tb-toggle:hover{background:var(--surface3);transform:translateY(-1px)}
.tb-toggle.on{background:#0f1d33;color:#ffd76a;border-color:rgba(255,215,106,.24)}
body.theme-night .tb-toggle{background:rgba(18,31,52,.95);border-color:rgba(140,171,214,.18);color:#d4e3fb;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
body.theme-night .tb-toggle.on{background:#152844;color:#ffd76a;border-color:rgba(255,215,106,.28)}

/* â”€â”€ SEARCH â”€â”€ */
.search-wrap{flex:1;max-width:500px;position:relative}
.search-row{display:flex;align-items:center;gap:8px;height:42px;background:rgba(245,247,253,.88);border:1px solid rgba(144,164,202,.24);border-radius:999px;padding:0 15px;box-shadow:inset 0 1px 0 rgba(255,255,255,.88);transition:border-color .2s,box-shadow .2s,background .2s}
.search-row:focus-within{border-color:rgba(0,137,123,.32);box-shadow:0 0 0 4px rgba(0,137,123,.1), inset 0 1px 0 rgba(255,255,255,.95);background:rgba(255,255,255,.96)}
.search-row svg{opacity:.35;flex-shrink:0}
.search-row input{flex:1;font-size:13px}
.search-row input::placeholder{color:var(--ink4)}
.search-clear{width:18px;height:18px;border-radius:50%;background:var(--line2);color:var(--ink3);display:none;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.search-clear.show{display:flex}
.search-drop{position:absolute;top:calc(100% + 8px);left:0;right:0;z-index:200;background:var(--surface);border:1px solid var(--line2);border-radius:var(--r16);box-shadow:var(--sh3);max-height:360px;overflow-y:auto;display:none;animation:fadeUp .15s ease}
.search-drop.show{display:block}
.dd-sec{padding:7px 14px 4px;font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--line)}
.dd-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .1s}
.dd-item:hover{background:var(--surface2)}
.dd-badge{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:600;flex-shrink:0;text-align:center;line-height:1.2}
.dd-name{font-size:13px;font-weight:600;line-height:1.2}
.dd-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.dd-empty{padding:16px 14px;font-size:13px;color:var(--ink3)}

/* â”€â”€ TABBAR â”€â”€ */
#tabbar{position:absolute;bottom:12px;left:12px;right:12px;z-index:100;height:var(--tabbar);display:flex;background:rgba(255,255,255,.65);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,.5);border-radius:26px;box-shadow:var(--sh2)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px 4px 9px;font-size:10px;font-weight:700;color:var(--ink3);border-top:2.5px solid transparent;transition:all .18s;position:relative}
.tab-btn.on{color:var(--ink)}
.tab-btn.on[data-t="all"]   {border-color:var(--ink);color:var(--ink)}
.tab-btn.on[data-t="tram"]  {border-color:var(--tram);color:var(--tram)}
.tab-btn.on[data-t="train"] {border-color:var(--train);color:var(--train)}
.tab-btn.on[data-t="bus"]   {border-color:var(--bus);color:var(--bus)}
.tab-btn.on[data-t="alerts"]{border-color:var(--danger);color:var(--danger)}
.tab-icon{font-size:20px;line-height:1}
.tab-ct{position:absolute;top:5px;right:calc(50% - 18px);background:var(--surface3);color:var(--ink2);border-radius:10px;padding:1px 5px;font-size:9px;font-weight:700;font-family:var(--mono);min-width:18px;text-align:center;transition:all .18s}
.tab-btn.on .tab-ct{background:currentColor;color:white}

/* â”€â”€ MAP â”€â”€ */
#map{position:absolute;inset:0;z-index:0;filter:saturate(1.05) contrast(1.02)}
.map-ctrl{position:absolute;top:88px;right:12px;z-index:40;display:flex;flex-direction:column;gap:8px}
.mc-btn{width:40px;height:40px;border-radius:14px;background:var(--surface);border:1px solid var(--line);box-shadow:var(--sh1);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--ink2);transition:all .15s}
.mc-btn:hover{background:var(--surface3);box-shadow:var(--sh2);transform:translateY(-1px)}
.mc-btn.on{background:var(--tram);color:white;border-color:var(--tram)}
body.theme-night .leaflet-control-attribution,body.theme-night .leaflet-control-attribution a{color:#9ab0cf!important;background:rgba(15,23,42,.65)}
.map-legend{position:absolute;bottom:86px;right:12px;z-index:40;background:rgba(255,255,255,.65);backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,.5);border-radius:16px;box-shadow:var(--sh1);padding:11px 13px;display:flex;flex-direction:column;gap:6px}
.leg-row{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--ink2);font-weight:500}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.user-dot{width:14px;height:14px;border-radius:50%;background:#2196f3;border:3px solid white;box-shadow:0 2px 8px rgba(33,150,243,.5)}

/* â”€â”€ SIDEBAR â”€â”€ */
#sidebar{position:absolute;top:88px;left:12px;bottom:84px;width:var(--sidebar);z-index:50;background:rgba(255,255,255,.65);backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,.45);border-radius:26px;box-shadow:var(--sh2);display:flex;flex-direction:column;overflow:hidden}
.sb-scroll{flex:1;overflow-y:auto}

/* â”€â”€ VEHICLE LIST â”€â”€ */
.vg-hdr{position:sticky;top:0;z-index:5;padding:10px 14px 8px;background:var(--surface);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.vg-pill{padding:1px 7px;border-radius:10px;font-size:9px;font-weight:700;font-family:var(--mono)}
.vcard{display:flex;align-items:center;gap:10px;margin:8px 10px 0;padding:11px 12px;border:1px solid var(--line);border-radius:18px;background:var(--surface2);cursor:pointer;transition:background .1s,transform .15s,box-shadow .15s,border-color .15s;position:relative;box-shadow:0 8px 20px rgba(15,23,42,.03)}
.vcard:hover{background:var(--surface3);transform:translateY(-1px);box-shadow:0 14px 28px rgba(15,23,42,.07)}
.vcard.sel{background:var(--surface);border:1px solid var(--tram-mid);box-shadow:0 16px 34px var(--tram-glow);border-left:3px solid var(--tram);padding-left:10px}
.vcard.sel[data-t="train"]{border-left-color:var(--train)}
.vcard.sel[data-t="bus"]{border-left-color:var(--bus)}
.vc-bd{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:600;line-height:1.2;text-align:center;flex-shrink:0}
.vc-body{flex:1;min-width:0}
.vc-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.vc-sub{display:flex;align-items:center;gap:4px;margin-top:2px;font-size:10px;color:var(--ink3);font-weight:500}
.vc-meta{margin-top:4px;font-size:10px;color:var(--ink2);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vc-dot{width:2px;height:2px;border-radius:50%;background:var(--ink4)}
.vc-occ{font-size:11px;margin-top:3px;display:flex;align-items:center;gap:4px;color:var(--ink3)}
.vc-actions{display:flex;align-items:center;gap:8px;margin-top:8px}
.vc-btn{height:26px;padding:0 10px;border-radius:999px;border:1px solid var(--line);background:var(--surface2);font-size:10px;font-weight:800;color:var(--ink2);display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.vc-btn:hover{background:var(--surface3);border-color:var(--line2)}
.vc-right{flex-shrink:0;text-align:right}
.vc-spd{font-family:var(--mono);font-size:12px;font-weight:500;line-height:1}
.vc-bear{font-size:10px;color:var(--ink3);margin-top:2px}
.vc-fav{position:absolute;top:8px;right:7px;width:5px;height:5px;border-radius:50%;background:var(--fav)}
.vc-alert{position:absolute;top:8px;right:15px;width:5px;height:5px;border-radius:50%;background:var(--danger);animation:blink 1.4s step-end infinite}
.empty{padding:40px 16px;text-align:center}
.empty-i{font-size:36px;margin-bottom:10px;opacity:.25}
.empty-t{font-size:13px;color:var(--ink3);font-weight:500}
.empty-s{font-size:11px;color:var(--ink4);margin-top:4px}

/* â”€â”€ ALERTS â”€â”€ */
.alerts-list{padding:10px;display:flex;flex-direction:column;gap:8px}
.alert-card{border-radius:var(--r12);background:var(--danger-lt);border:1px solid rgba(183,28,28,.15);overflow:hidden;animation:fadeUp .2s ease}
.alert-hd{display:flex;align-items:flex-start;gap:8px;padding:10px 12px 6px}
.alert-ico{font-size:15px;flex-shrink:0;margin-top:1px}
.alert-title{font-size:13px;font-weight:700;color:var(--danger);line-height:1.35}
.alert-body{padding:0 12px 10px;font-size:12px;color:var(--ink2);line-height:1.6}
.alert-routes{display:flex;flex-wrap:wrap;gap:4px;padding:4px 12px 8px}
.alert-rt{display:inline-flex;align-items:center;gap:3px;background:rgba(183,28,28,.12);color:var(--danger);border-radius:6px;padding:2px 7px;font-family:var(--mono);font-size:9px;font-weight:600}

/* â”€â”€ STOP / DEPARTURES â”€â”€ */
.stop-hdr{padding:12px 14px 10px;border-bottom:1px solid var(--line);flex-shrink:0}
.stop-hdr-row{display:flex;align-items:center;gap:8px}
.stop-back{width:28px;height:28px;border-radius:var(--r8);background:var(--surface2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:background .15s}
.stop-back:hover{background:var(--line)}
.stop-name-big{font-size:15px;font-weight:800;flex:1}
.stop-id-sm{font-size:11px;color:var(--ink3);font-family:var(--mono);margin-top:3px}
.dep-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s}
.dep-row:hover{background:var(--surface2)}
.dep-bd{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:600;flex-shrink:0;text-align:center;line-height:1.2}
.dep-body{flex:1;min-width:0}
.dep-route{font-size:13px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dep-head{font-size:11px;color:var(--ink2);margin-top:3px;font-weight:600}
.dep-times{flex-shrink:0;text-align:right}
.dep-sched{font-family:var(--mono);font-size:11px;color:var(--ink2);font-weight:600}
.dep-rt{font-family:var(--mono);font-size:13px;font-weight:700}
.dep-delay{font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px;display:inline-block;margin-top:2px}
.dep-delay.late{background:var(--danger-lt);color:var(--danger)}
.dep-delay.early,.dep-delay.ontime{background:var(--ok-lt);color:var(--ok)}
.dep-tag{display:inline-flex;align-items:center;gap:4px;margin-left:6px;padding:2px 7px;border-radius:999px;background:#eef4ff;color:#4a6ea8;font-size:9px;font-weight:800;letter-spacing:.02em;text-transform:uppercase}
.dep-actions{padding:12px 14px 16px;display:flex;justify-content:center}
.dep-more-btn{padding:10px 16px;border-radius:999px;background:var(--surface2);border:1px solid var(--line);font-size:12px;font-weight:700;color:var(--ink2);box-shadow:var(--sh0);transition:all .15s}
.dep-more-btn:hover{background:var(--surface3);border-color:var(--line2)}
.planner-wrap{padding:12px 12px 16px;display:flex;flex-direction:column;gap:10px}
.planner-card{background:rgba(255,255,255,.78);border:1px solid rgba(144,164,202,.16);border-radius:18px;padding:12px;box-shadow:0 8px 20px rgba(20,38,71,.04)}
.planner-head{display:flex;align-items:center;gap:8px;padding:12px 14px 10px;border-bottom:1px solid var(--line);flex-shrink:0}
.planner-title{font-size:15px;font-weight:800;flex:1}
.planner-sub{font-size:11px;color:var(--ink3);margin-top:2px}
.planner-grid{display:grid;gap:10px}
.planner-field{display:flex;flex-direction:column;gap:6px;position:relative}
.planner-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}
.planner-input{height:42px;border-radius:14px;background:var(--surface2);border:1px solid var(--line);padding:0 14px;font-size:13px;color:var(--ink);box-shadow:inset 0 1px 0 rgba(255,255,255,.7)}
.planner-input::placeholder{color:var(--ink4)}
.planner-swap{width:42px;height:42px;border-radius:14px;background:var(--surface2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--ink2);align-self:center}
.planner-btn{height:42px;border-radius:14px;background:linear-gradient(135deg,var(--tram),#00acc1);color:#fff;font-weight:800;font-size:13px;box-shadow:0 12px 24px rgba(0,137,123,.22)}
.planner-btn:disabled{opacity:.5;cursor:default;box-shadow:none}
.planner-suggestions{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:15;background:var(--surface);border:1px solid var(--line2);border-radius:14px;box-shadow:var(--sh2);overflow:hidden}
.planner-suggestion{padding:10px 12px;cursor:pointer;border-top:1px solid var(--line);background:var(--surface)}
.planner-suggestion:first-child{border-top:none}
.planner-suggestion:hover{background:var(--surface2)}
.planner-route{display:flex;align-items:flex-start;gap:10px;padding:12px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.72)}
.planner-badge{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:700;text-align:center;flex-shrink:0}
.planner-body{flex:1;min-width:0}
.planner-route-name{font-size:13px;font-weight:800;line-height:1.25}
.planner-meta{font-size:11px;color:var(--ink2);margin-top:4px;line-height:1.45}
.planner-times{flex-shrink:0;text-align:right}
.planner-time-main{font-family:var(--mono);font-size:13px;font-weight:800;color:var(--ink)}
.planner-time-sub{font-size:10px;color:var(--ink3);margin-top:3px}
.planner-inline{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:7px}
.planner-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;background:var(--surface2);border:1px solid var(--line);font-size:10px;font-weight:700;color:var(--ink2)}

/* â”€â”€ ETA countdown pill â”€â”€ */
.eta-pill{
  display:inline-flex;align-items:center;gap:4px;
  font-family:var(--mono);font-size:14px;font-weight:700;
  padding:3px 9px;border-radius:20px;line-height:1;
  transition:color .3s,background .3s;
}
.eta-pill.urgent{background:#fff3e0;color:#e65100}   /* < 2 min */
.eta-pill.soon  {background:#e8f5e9;color:#2e7d32}   /* 2–8 min */
.eta-pill.later {background:#e8f1ff;color:#2f5ea8} /* > 8 min */
.eta-pill.due   {background:#fce4ec;color:#c62828;animation:blink .7s step-end infinite}
.eta-sched{font-family:var(--mono);font-size:10px;color:var(--ink4);margin-top:1px}

/* â”€â”€ Nearby stops â”€â”€ */
.nearby-hdr{padding:12px 14px 10px;border-bottom:1px solid var(--line);flex-shrink:0}
.nearby-hdr-row{display:flex;align-items:center;gap:8px}
.nearby-title{font-size:15px;font-weight:800;flex:1}
.nearby-sub{font-size:11px;color:var(--ink3);margin-top:2px}
.nearby-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s}
.nearby-row:hover{background:var(--surface2)}
.nearby-dot{width:38px;height:38px;border-radius:50%;background:var(--surface3);border:1.5px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.nearby-body{flex:1;min-width:0}
.nearby-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nearby-meta{font-size:10px;color:var(--ink3);margin-top:2px}
.nearby-dist{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink2);flex-shrink:0}

/* â”€â”€ DETAIL PANEL â”€â”€ */
#detail{position:absolute;top:88px;right:12px;bottom:84px;width:372px;z-index:60;background:rgba(255,255,255,.65);backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,.45);border-radius:26px;box-shadow:var(--sh3);display:flex;flex-direction:column;overflow:hidden;transform:translateX(calc(100% + 24px));transition:transform .28s cubic-bezier(.22,1,.36,1)}
#detail.open{transform:translateX(0)}
.dp-head{display:flex;align-items:center;gap:8px;padding:0 14px;height:54px;border-bottom:1px solid var(--line);background:var(--surface);flex-shrink:0}
.dp-title{font-size:14px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dp-scroll{flex:1;overflow-y:auto;padding-bottom:12px}
.detail-actions{margin:12px 12px 8px;padding:12px;background:rgba(255,255,255,.76);border:1px solid rgba(144,164,202,.18);border-radius:18px;box-shadow:inset 0 1px 0 rgba(255,255,255,.8)}
.detail-actions-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.detail-action-btn{min-height:42px;padding:0 12px;border-radius:14px;background:var(--surface2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;gap:7px;font-size:12px;font-weight:800;color:var(--ink2);text-align:center;transition:all .15s}
.detail-action-btn:hover{background:var(--surface3);border-color:var(--line2)}
.detail-action-btn .ico{font-size:14px;line-height:1}
.detail-action-btn.on{background:var(--tram);color:#fff;border-color:var(--tram)}
.detail-action-btn.fav-on{background:var(--fav-lt);border-color:var(--fav);color:var(--ink)}
.detail-actions-note{margin-top:9px;font-size:11px;color:var(--ink3);line-height:1.45}
.d-hero{margin:12px 12px 6px;padding:15px;background:linear-gradient(135deg, rgba(233,238,251,.72), rgba(255,255,255,.92));border:1px solid rgba(144,164,202,.18);border-radius:20px;display:flex;gap:12px;align-items:flex-start;box-shadow:inset 0 1px 0 rgba(255,255,255,.75)}
.d-hero-bd{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:600;line-height:1.2;text-align:center;flex-shrink:0}
.d-hero-name{font-size:15px;font-weight:800;line-height:1.2;letter-spacing:-.2px}
.d-hero-long{font-size:11px;color:var(--ink3);margin-top:2px;line-height:1.4}
.d-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.d-chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid}
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:0 12px 6px}
.kpi{background:rgba(255,255,255,.76);border:1px solid rgba(144,164,202,.18);border-radius:16px;padding:11px 8px;text-align:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.8)}
.kpi-v{font-size:21px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.kpi-l{font-size:9px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.kpi-row.stops{grid-template-columns:repeat(2,1fr)}
.kpi-v.stop{font-size:13px;line-height:1.25;letter-spacing:-.2px;font-weight:800}
.kpi-v.stop.muted{color:var(--ink3)}
.crowd-card{margin:0 12px 6px;background:var(--surface2);border:1px solid var(--line);border-radius:var(--r12);padding:12px 14px}
.crowd-lbl{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.crowd-bg{height:8px;background:var(--line);border-radius:4px;overflow:hidden;margin-bottom:8px}
.crowd-fill{height:100%;border-radius:4px;transition:width .5s ease}
.crowd-row{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700}
.crowd-row span:last-child{font-size:11px;color:var(--ink3);margin-left:auto;font-weight:400}
.d-sec{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:1px;text-transform:uppercase;padding:12px 14px 6px;display:flex;align-items:center;gap:8px}
.d-sec::after{content:'';flex:1;height:1px;background:var(--line)}
.gps-row{margin:0 12px 6px;display:flex;background:var(--surface2);border:1px solid var(--line);border-radius:var(--r12);overflow:hidden}
.gps-cell{flex:1;padding:10px 12px;border-right:1px solid var(--line)}
.gps-cell:last-child{border-right:none}
.gps-lbl{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.gps-val{font-family:var(--mono);font-size:12px;font-weight:500}
.dp-alert{margin:0 12px 6px;background:var(--danger-lt);border:1px solid rgba(183,28,28,.15);border-radius:var(--r12);padding:10px 12px}
.dp-alert-title{font-size:12px;font-weight:700;color:var(--danger);margin-bottom:3px}
.dp-alert-body{font-size:11px;color:var(--ink2);line-height:1.6}
.stop-tl{padding:0 0 4px}
.stop-row{display:flex;align-items:flex-start;gap:10px;padding:6px 14px}
.stop-spine{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:16px}
.stop-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--line2);background:var(--surface);flex-shrink:0}
.stop-dot.nxt{width:12px;height:12px}
.stop-dot.past{background:var(--line2);border-color:var(--line2)}
.stop-dot.cur{width:12px;height:12px}
.stop-conn{width:2px;flex:1;min-height:14px;background:var(--line)}
.stop-content{flex:1;padding-bottom:6px;min-width:0}
.stop-nm{font-size:12px;font-weight:600;line-height:1.3}
.stop-times{display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap}
.stop-sched{font-family:var(--mono);font-size:10px;color:var(--ink3)}
.stop-rt{font-family:var(--mono);font-size:10px;font-weight:600}
.stop-delay{font-size:9px;font-weight:700;padding:1px 5px;border-radius:7px}
.stop-delay.late{background:var(--danger-lt);color:var(--danger)}
.stop-delay.early,.stop-delay.ontime{background:var(--ok-lt);color:var(--ok)}
.trip-grid{margin:0 12px 12px;background:var(--surface2);border:1px solid var(--line);border-radius:var(--r12);display:grid;grid-template-columns:1fr 1fr}
.ti-cell{padding:10px 12px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
.ti-cell:nth-child(even){border-right:none}
.ti-cell:nth-last-child(-n+2){border-bottom:none}
.ti-lbl{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.ti-val{font-family:var(--mono);font-size:11px;font-weight:500;word-break:break-all}

/* â”€â”€ Hamburger — desktop hidden â”€â”€ */
#mob-hamburger{ display:none; }
#mob-backdrop{ display:none; }
.drawer-close-row{ display:none; }
.drawer-tabs{display:none;}
.drawer-tab-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;padding:12px;border-bottom:1px solid var(--line);background:linear-gradient(180deg, rgba(245,247,253,.92), rgba(255,255,255,.78))}
.drawer-tab-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 6px;border-radius:18px;background:rgba(255,255,255,.8);border:1px solid rgba(144,164,202,.18);color:var(--ink3);font-size:10px;font-weight:700;transition:all .18s;position:relative;min-height:62px}
.drawer-tab-btn.on{color:var(--ink);background:rgba(255,255,255,.98);box-shadow:0 10px 24px rgba(20,38,71,.08)}
.drawer-tab-btn[data-t="tram"].on{color:var(--tram);border-color:rgba(0,137,123,.22)}
.drawer-tab-btn[data-t="train"].on{color:var(--train);border-color:rgba(57,73,171,.22)}
.drawer-tab-btn[data-t="bus"].on{color:var(--bus);border-color:rgba(230,81,0,.22)}
.drawer-tab-btn[data-t="alerts"].on{color:var(--danger);border-color:rgba(183,28,28,.22)}
.drawer-tab-icon{font-size:18px;line-height:1}
.drawer-tab-count{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:18px;padding:0 6px;border-radius:999px;background:var(--surface3);color:var(--ink2);font-size:9px;font-weight:800;font-family:var(--mono)}
.drawer-tab-btn.on .drawer-tab-count{background:currentColor;color:#fff}
.filter-bar{display:flex;align-items:center;gap:8px;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--line);background:var(--surface);position:sticky;top:0;z-index:6}
.filter-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-width:0}
.filter-lbl{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--ink3)}
.filter-chip{display:inline-flex;align-items:center;gap:5px;max-width:100%;padding:4px 10px;border-radius:999px;background:var(--surface2);border:1px solid var(--line);font-size:11px;font-weight:700;color:var(--ink2)}
.filter-chip strong{font-family:var(--mono);font-size:10px;letter-spacing:.2px}
.filter-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.filter-btn{padding:5px 9px;border-radius:999px;background:var(--surface2);border:1px solid var(--line);font-size:11px;font-weight:700;color:var(--ink2);transition:background .15s,border-color .15s,color .15s}
.filter-btn:hover{background:var(--surface3);border-color:var(--line2)}

@media(max-width:680px){
  :root{ --peek:156px; --peek-follow:328px; --expanded:72dvh; --tabbar:58px; }

  /* topbar */
  #topbar{ position:fixed; top:10px; left:10px; right:10px; z-index:200; padding:0 10px; gap:7px; height:56px; border-radius:18px; }
  .tb-logo{ gap:7px; min-width:0; }
  .tb-icon{ width:32px; height:32px; border-radius:11px; }
  .tb-name{ font-size:12px; letter-spacing:-.2px; max-width:92px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tb-sub{ display:none; }
  .tb-actions{ gap:6px; }
  .tb-toggle{ width:34px; height:34px; border-radius:12px; font-size:14px; }
  #planner-toggle{ display:none; }
  .search-wrap{ min-width:0; flex:1 1 auto; }
  .search-row{ height:38px; padding:0 12px; min-width:0; width:100%; }
  .search-row input{ font-size:12px; min-width:0; width:100%; }
  .live-pill span{ display:none; }
  .live-pill{ padding:6px 8px; border-radius:50%; }

  /* hamburger */
  #mob-hamburger{
    display:flex; flex-direction:column; justify-content:center; gap:4px;
    width:36px; height:36px; border-radius:var(--r8);
    background:var(--surface2); border:1px solid var(--line);
    padding:8px 7px; flex-shrink:0; cursor:pointer; transition:background .15s;
  }
  #mob-hamburger:hover{ background:var(--line); }
  #mob-hamburger span{ display:block; height:2px; background:var(--ink2); border-radius:2px; transition:all .22s; }
  #mob-hamburger.open span:nth-child(1){ transform:translateY(6px) rotate(45deg); }
  #mob-hamburger.open span:nth-child(2){ opacity:0; transform:scaleX(0); }
  #mob-hamburger.open span:nth-child(3){ transform:translateY(-6px) rotate(-45deg); }

  /* tabbar */
  #tabbar{ position:fixed; bottom:10px; left:10px; right:10px; z-index:200; border-radius:18px; }

  /* map fills between bars */
  #map{ position:fixed; top:0; bottom:0; left:0; right:0; z-index:0; }

  /* map controls */
  .map-ctrl{ position:fixed; top:78px; right:10px; z-index:50; }
  .map-legend{ display:none; }

  /* backdrop */
  #mob-backdrop{
    display:block; position:fixed; inset:0; z-index:209;
    background:rgba(0,0,0,.5); opacity:0; pointer-events:none;
    transition:opacity .28s ease;
  }
  #mob-backdrop.show{ opacity:1; pointer-events:all; }

  /* sidebar — slide-in drawer from left */
  #sidebar{
    position:fixed;
    top:76px; bottom:78px;
    left:10px; right:10px; width:auto; height:auto;
    border-right:none; border-top:none; border-radius:24px;
    box-shadow:6px 0 32px rgba(0,0,0,.2);
    transform:translateX(calc(-100% - 20px));
    transition:transform .3s cubic-bezier(.22,1,.36,1);
    z-index:210;
    overflow-y:auto;
    display:flex; flex-direction:column;
  }
  #sidebar.drawer-open{ transform:translateX(0); }
  #sidebar::before{ display:none; }

  /* close row inside drawer */
  .drawer-close-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px 8px; border-bottom:1px solid var(--line); flex-shrink:0;
  }
  .drawer-tabs{ display:block; }
  .drawer-title{ font-size:15px; font-weight:700; }
  .drawer-close-btn{
    width:30px; height:30px; border-radius:var(--r8);
    background:var(--surface2); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-size:18px; color:var(--ink2); cursor:pointer;
  }
  .filter-bar{ top:0; }
  #sidebar.drawer-open ~ #tabbar{ opacity:0; pointer-events:none; transform:translateY(18px); }

  /* stats compact */
  .stats-strip{ display:none; }

  /* detail panel — bottom sheet */
  #detail{
    position:fixed; bottom:78px; left:10px; right:10px; width:auto;
    height:var(--expanded); top:auto;
    --sheet-peek:var(--peek);
    border-left:none; border-top:1px solid var(--line);
    border-radius:20px 20px 0 0;
    box-shadow:0 -8px 40px rgba(0,0,0,.18);
    transform:translateY(100%);
    transition:transform .32s cubic-bezier(.22,1,.36,1);
    z-index:160;
  }
  #detail.follow-compact{ --sheet-peek:var(--peek-follow); }

// â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
// ETA COUNTDOWN ENGINE
// â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
// Returns minutes until an ISO datetime (negative = overdue)
function minsUntil(iso) {
  if (!iso) return null;
  return (new Date(iso) - Date.now()) / 60000;
}

// Formats minutes into a human countdown string
function fmtCountdown(mins) {
  if (mins === null) return null;
  if (mins < -1)   return { text: 'Due', cls: 'due',    color: '#c62828' };
  if (mins < 0.5)  return { text: 'Now', cls: 'urgent', color: '#e65100' };
  if (mins < 2)    return { text: `${Math.round(mins * 60)} sec`,  cls: 'urgent', color: '#e65100' };
  if (mins < 60)   return { text: `${Math.floor(mins)} min`,       cls: mins < 8 ? 'soon' : 'later', color: mins < 8 ? '#2e7d32' : 'var(--ink2)' };
  const h = Math.floor(mins / 60), m = Math.round(mins % 60);
  return { text: m > 0 ? `${h} hr ${m} min` : `${h} hr`, cls: 'later', color: 'var(--ink3)' };
}

// Build an ETA pill element string for a realtime ISO time + scheduled fallback
function etaPill(realtimeIso, scheduledStr, delay) {
  const mins = minsUntil(realtimeIso);
  const cd   = mins !== null ? fmtCountdown(mins) : null;
  const delayInfo = fmtDelay(delay);
  const schedDisplay = scheduledTimeDisplay(scheduledStr);

  if (cd) {
    // Register this element for live ticking — we use a data attr as key
    const key = `eta-${realtimeIso}`;
    S.etaTargets[key] = { iso: realtimeIso };
    return `<div style="text-align:right">
      <div class="eta-pill ${cd.cls}" data-eta="${key}">${cd.text}</div>
      ${scheduledStr ? `<div class="eta-sched">${schedDisplay}</div>` : ''}
      ${delayInfo ? `<div class="dep-delay ${delayInfo.cls}">${delayInfo.label}</div>` : ''}
    </div>`;
  }
  // Fallback to static time
  return `<div style="text-align:right">
    ${scheduledStr ? `<div class="dep-sched">${schedDisplay}</div>` : ''}
    ${delayInfo ? `<div class="dep-delay ${delayInfo.cls}">${delayInfo.label}</div>` : ''}
  </div>`;
}
function etaPillFromDeparture(dep, keySeed='sched') {
  const targetTs = departureTs(dep);
  const delayInfo = fmtDelay(deriveDelaySeconds(dep));
  const schedDisplay = scheduledTimeDisplay(dep.scheduledTime);
  if (targetTs != null) {
    const mins = (targetTs - Date.now()) / 60000;
    const cd = fmtCountdown(mins);
    if (cd) {
      const key = `eta-${keySeed}-${dep.tripId||dep.routeId||dep.scheduledTime}`;
      S.etaTargets[key] = { ts: targetTs };
      return `<div style="text-align:right">
        <div class="eta-pill ${cd.cls}" data-eta="${key}">${cd.text}</div>
        ${dep.scheduledTime ? `<div class="eta-sched">${schedDisplay}</div>` : ''}
        ${delayInfo ? `<div class="dep-delay ${delayInfo.cls}">${delayInfo.label}</div>` : ''}
      </div>`;
    }
  }
  return etaPill(dep.realtimeTime, dep.scheduledTime, dep.delay);
}

// Tick all registered ETA elements every second
function startEtaTicker() {
  if (S.etaTimer) clearInterval(S.etaTimer);
  S.etaTimer = setInterval(() => {
    const els = document.querySelectorAll('[data-eta]');
    els.forEach(el => {
      const key = el.dataset.eta;
      const target = S.etaTargets[key];
      if (!target) return;
      const mins = target.iso ? minsUntil(target.iso) : target.ts!=null ? ((target.ts - Date.now()) / 60000) : null;
      const cd   = fmtCountdown(mins);
      if (!cd) return;
      el.textContent = cd.text;
      el.className   = `eta-pill ${cd.cls}`;
    });
  }, 1000);
}

// Stop ticker and clear targets when rebuilding DOM
function resetEtaTargets() {

}

// â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
// HELPERS
// â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
const DIRS = ['N','NE','E','SE','S','SW','W','NW'];
const bearDir = b => DIRS[Math.round(((b||0)+360)/45)%8];
const fmtTime = iso => { try { return new Date(iso).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',timeZone:'Australia/Adelaide'}); } catch{ return '—'; }};
const adelaideNowDate = () => new Date();

function adelaideTimeParts(timeMs) {
  const d = new Date(timeMs);
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'Australia/Adelaide', year: 'numeric', month: 'numeric', day: 'numeric',
    hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: false
  }).formatToParts(d);
  const get = (type) => parseInt(parts.find(p => p.type === type).value, 10);
  return { y: get('year'), m: get('month') - 1, d: get('day'), h: get('hour') === 24 ? 0 : get('hour'), min: get('minute'), s: get('second') };
}

function getAdelaideEpoch(y, m, d, h, min, s) {
  const clockUTC = Date.UTC(y, m, d, h, min, s);
  const guessEpoch = clockUTC - 34200000;
  const p = adelaideTimeParts(guessEpoch);
  const actualClock = Date.UTC(p.y, p.m, p.d, p.h, p.min, p.s);
  return guessEpoch + (clockUTC - actualClock);
}

const SERVICE_DAY_ROLLOVER_HOUR = 4;

function scheduledTimeTs(scheduledStr) {
  if (!scheduledStr) return null;
  const parts = String(scheduledStr).split(':').map(Number);
  if (parts.length < 2 || parts.some(Number.isNaN)) return null;
  const [hh = 0, mm = 0, ss = 0] = parts;

  const adl = adelaideTimeParts(Date.now());
  let { y, m, d } = adl;
  if (adl.h < SERVICE_DAY_ROLLOVER_HOUR) {
    const prev = new Date(Date.UTC(y, m, d - 1));
    y = prev.getUTCFullYear(); m = prev.getUTCMonth(); d = prev.getUTCDate();
  }
  return getAdelaideEpoch(y, m, d + Math.floor(hh / 24), hh % 24, mm, ss);
}

function scheduledTimeDisplay(scheduledStr) {
  const ts = scheduledTimeTs(scheduledStr);
  if (!ts) return scheduledStr || '—';
  return new Date(ts).toLocaleTimeString('en-AU', { hour:'2-digit', minute:'2-digit', hour12:true, timeZone:'Australia/Adelaide' }).toLowerCase();
}

function departureTs(dep) {
  if (dep.realtimeTime) {
    const ts = new Date(dep.realtimeTime).getTime();
    return Number.isNaN(ts) ? null : ts;
  }
  return scheduledTimeTs(dep.scheduledTime);
}

function upcomingDeparturesOnly(departures) {
  const now = Date.now();
  return departures.filter(dep => {
    const ts = departureTs(dep);
    return ts == null || ts >= now - 60000;
  });
}
function deriveDelaySeconds(item) {
  const explicit = Number(item?.delay || 0);
  if (explicit) return explicit;
  const realtimeIso = item?.realtimeTime || item?.arrivalTime || item?.departureTime || null;
  const scheduledStr = item?.scheduledTime || null;
  if (!realtimeIso || !scheduledStr) return 0;
  const realtimeTs = new Date(realtimeIso).getTime();
  const scheduledTs = scheduledTimeTs(scheduledStr);
  if (Number.isNaN(realtimeTs) || scheduledTs == null) return 0;
  return Math.round((realtimeTs - scheduledTs) / 1000);
}
const fmtDelay = sec => {
  if (!sec) return null;
  const m = Math.round(sec/60);
  if (m===0) return {label:'On time',cls:'ontime',color:'var(--ok)'};
  if (m>0)   return {label:`+${m} min`,cls:'late',color:'var(--danger)'};
  return {label:`${Math.abs(m)} min early`,cls:'early',color:'var(--ok)'};
};
const vColor = (type, speed) => type==='tram'?'var(--tram)':type==='train'?'var(--train)':speed>0.5?'var(--bus)':'var(--stopped)';
const vBg    = (type, speed) => type==='tram'?'var(--tram-lt)':type==='train'?'var(--train-lt)':speed>0.5?'var(--bus-lt)':'var(--stopped-lt)';

const CROWD = {
  0:{label:'Empty',           emoji:'🟢',pct:5,   color:'var(--crowd-low)'},
  1:{label:'Many seats',      emoji:'🟢',pct:20,  color:'var(--crowd-low)'},
  2:{label:'Few seats left',  emoji:'🟡',pct:55,  color:'var(--crowd-mid)'},
  3:{label:'Standing room',   emoji:'🟠',pct:78,  color:'var(--crowd-mid)'},
  4:{label:'Very crowded',    emoji:'🔴',pct:92,  color:'var(--crowd-high)'},
  5:{label:'Full',            emoji:'🔴',pct:100, color:'var(--crowd-high)'},
  6:{label:'Not accepting',   emoji:'⛔',pct:100, color:'var(--crowd-high)'},
};

function firstDelayedStop(upcomingStops) {
  if (!upcomingStops?.length) return null;
  return upcomingStops.find(s => s?.timelineStatus !== 'passed' && Math.abs(deriveDelaySeconds(s)) > 0) || null;
}

function vehicleToward(v) {
  const lastStopName = v?.upcomingStops?.[v.upcomingStops.length - 1]?.stopName;
  const fallback = v?.headsign || '';
  const toward = lastStopName || fallback;
  return toward ? `Toward ${toward}` : '';
}

function nextStopForVehicle(v) {
  const stop = vehicleNextStop(v) || v?.upcomingStops?.find(s => s?.stopId && (s?.lat != null || s?.stopLat != null) && (s?.lon != null || s?.stopLon != null));
  if (!stop) return null;
  return {
    stopId: stop.stopId,
    name: stop.stopName || stop.name || 'Next stop',
    code: stop.stopCode || stop.code || '',
    lat: stop.lat ?? stop.stopLat,
    lon: stop.lon ?? stop.stopLon
  };
}

function vehicleCurrentStop(v) {
  return v?.upcomingStops?.find(s => s?.timelineStatus === 'current') || null;
}

function vehicleNextStop(v) {
  return v?.upcomingStops?.find(s => s?.timelineStatus === 'next')
    || v?.upcomingStops?.find(s => s?.timelineStatus === 'upcoming')
    || null;
}

function openVehicleNextStop(vehicleId, ev) {
  ev?.stopPropagation?.();
  const v = S.vehicles.find(x => x.vehicleId === vehicleId);
  const stop = nextStopForVehicle(v);
  if (!stop) return;
  focusStopOnMap(stop);
}

const markers = {};
const busDots = {};
const iconCache = new Map();
const MARKER_VIEWPORT_PAD = 0.35;
const DETAILED_MARKER_ZOOM = 14;
let mapInteractionActive = false;

function markerIconKey(v, sel) {
  const zoom = map.getZoom ? map.getZoom() : DETAILED_MARKER_ZOOM;
  const compact = zoom < DETAILED_MARKER_ZOOM && !sel;
  const bearingBucket = v.speed > 0.5 ? Math.round((v.bearing || 0) / 10) * 10 : 0;
  return [
    v.routeType || 'bus',
    v.routeShort || '',
    sel ? 'sel' : 'base',
    compact ? 'compact' : 'full',
    v.speed > 0.5 ? 'moving' : 'stopped',
    bearingBucket,
    v.alerts?.length ? 'alert' : 'clear',
    v.occupancy?.emoji || '',
  ].join('|');
}

function shouldRenderMarker(v, bounds) {
  if (!bounds) return true;
  return bounds.contains([v.lat, v.lon]) || v.vehicleId === S.selectedId;
}

function useBusDot(v) {
  const zoom = map.getZoom ? map.getZoom() : DETAILED_MARKER_ZOOM;
  return v.routeType === 'bus' && v.vehicleId !== S.selectedId && zoom < DETAILED_MARKER_ZOOM;
}

function busDotStyle(v, visible) {
  const moving = v.speed > 0.5;
  return {
    radius: moving ? 5 : 4,
    color: '#ffffff',
    weight: 1.25,
    fillColor: vColor(v.routeType, v.speed),
    fillOpacity: S.followMode ? 0.18 : visible ? 0.88 : 0.18,
    opacity: S.followMode ? 0.25 : visible ? 0.95 : 0.2,
  };
}

function syncBusDot(v, visible) {
  const id = v.vehicleId;
  const style = busDotStyle(v, visible);
  let dot = busDots[id];
  if (dot) {
    dot.setLatLng([v.lat, v.lon]);
    dot.setStyle(style);
    if (visible) dot.bringToFront();
    return;
  }
  dot = L.circleMarker([v.lat, v.lon], style);
  dot.on('click', () => selectVehicle(v.vehicleId));
  dot.addTo(map);
  busDots[id] = dot;
}

function removeMarkerInstance(id) {
  if (markers[id]) {
    markers[id].remove();
    delete markers[id];
  }
}

function removeBusDot(id) {
  if (busDots[id]) {
    busDots[id].remove();
    delete busDots[id];
  }
}

function makeIcon(v, sel) {
  const key = markerIconKey(v, sel);
  const cached = iconCache.get(key);
  if (cached) return cached;
  const color = vColor(v.routeType, v.speed);
  const label = (v.routeShort||'').substring(0,6);
  const isTram = v.routeType==='tram', isTrain = v.routeType==='train';
  const zoom = map.getZoom ? map.getZoom() : DETAILED_MARKER_ZOOM;
  const compact = zoom < DETAILED_MARKER_ZOOM && !sel;
  let sz = isTram?28:isTrain?26:v.speed>0.5?20:13;
  if (sel) sz = Math.round(sz*1.4);
  if (compact) sz = isTram ? 16 : isTrain ? 15 : 11;

  let arrow='';
  if (v.speed>0.5 && !compact) {
    const a=v.bearing||0, asz=sz+12, mid=asz/2;
    arrow=`<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(${a}deg);pointer-events:none;width:${asz}px;height:${asz}px;overflow:visible"><svg width="${asz}" height="${asz}" viewBox="0 0 ${asz} ${asz}" style="overflow:visible"><polygon points="${mid},2 ${mid-4},10 ${mid+4},10" fill="${color}" opacity="0.7"/></svg></div>`;
  }
  const alertRing = v.alerts?.length ? `<div style="position:absolute;inset:${compact ? '-3px' : '-5px'};border-radius:50%;border:${compact ? '1.5px' : '2px'} solid rgba(183,28,28,.6);pointer-events:none"></div>` : '';
  const selRing   = sel ? `<div style="position:absolute;inset:-6px;border-radius:50%;border:2.5px solid ${color};opacity:.4;pointer-events:none"></div>` : '';
  const occBadge  = (isTram && v.occupancy && !compact) ? `<div style="position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);font-size:10px;line-height:1;pointer-events:none">${v.occupancy.emoji}</div>` : '';
  const liveBadge = (v.speed>0.5 && !compact) ? `<div style="position:absolute;top:-2px;right:-2px;width:7px;height:7px;border-radius:50%;background:var(--ok);border:1.5px solid var(--surface);animation:pulse 2s infinite;box-shadow:0 0 4px var(--ok);pointer-events:none;z-index:2"></div>` : '';
  const border    = sel ? `border:3px solid var(--surface);box-shadow:0 0 0 3px ${color},0 4px 12px rgba(0,0,0,.25)` : compact ? `border:1.5px solid rgba(255,255,255,.9);box-shadow:0 1px 4px rgba(0,0,0,.18)` : `border:2px solid var(--surface);box-shadow:0 2px 6px rgba(0,0,0,.2)`;
  const showLbl   = !compact && (isTram||isTrain||sel);
  const fs        = Math.max(7, Math.round(sz/3.2));
  const lbl       = showLbl ? `<span style="font-family:'JetBrains Mono',monospace;font-size:${fs}px;font-weight:600;color:white;line-height:1;text-align:center;max-width:${sz-4}px;overflow:hidden;display:block">${label}</span>` : '';

  const html = `<div style="position:relative;width:${sz}px;height:${sz}px">${selRing}${arrow}${alertRing}<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${color};${border};display:flex;align-items:center;justify-content:center;cursor:pointer">${lbl}</div>${occBadge}${liveBadge}</div>`;
  const icon = L.divIcon({ html, className:'', iconSize:[sz,sz], iconAnchor:[sz/2,sz/2] });
  iconCache.set(key, icon);
  return icon;
}

// Smooth interpolation between two GPS positions over `ms` milliseconds
function animateMarkerTo(marker, toLat, toLon, ms) {
  if (mapInteractionActive) { marker.setLatLng([toLat, toLon]); return; }
  const el = marker.getElement();
  if (!el) { marker.setLatLng([toLat, toLon]); return; }

  const from = marker.getLatLng();
  const dLat = toLat - from.lat;
  const dLon = toLon - from.lng;
  if (Math.abs(dLat) < 0.000005 && Math.abs(dLon) < 0.000005) return; // no meaningful movement

  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / ms, 1);
    // Ease in-out cubic
    const e = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
    marker.setLatLng([from.lat + dLat*e, from.lng + dLon*e]);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function updateMarkers() {
  const filteredSet = new Set(getFiltered().map(v=>v.vehicleId));
  const seen = new Set();
  const bounds = map.getBounds ? map.getBounds().pad(MARKER_VIEWPORT_PAD) : null;

  S.vehicles.forEach(v => {
    if (!v.lat||!v.lon) return;
    if (!shouldRenderMarker(v, bounds)) return;
    seen.add(v.vehicleId);
    const sel = v.vehicleId===S.selectedId;
    const vis = filteredSet.has(v.vehicleId);
    if (useBusDot(v)) {
      removeMarkerInstance(v.vehicleId);
      syncBusDot(v, vis);
      return;
    }
    removeBusDot(v.vehicleId);
    const icon = makeIcon(v, sel);
    const zi = v.routeType==='tram'?200:v.routeType==='train'?100:0;

    // Follow mode: selected vehicle stays bright, everything else fades away
    const opacity = sel ? 1 : S.followMode ? 0.05 : vis ? 1 : 0.07;

    if (markers[v.vehicleId]) {
      const m = markers[v.vehicleId];
      if (v.speed > 0.5) {
        animateMarkerTo(m, v.lat, v.lon, 900);
      } else {
        m.setLatLng([v.lat, v.lon]);
      }
      m.setIcon(icon);
      m.setOpacity(opacity);
      m.setZIndexOffset(sel ? 900 : zi);
    } else {
      const m = L.marker([v.lat,v.lon], {icon, opacity, zIndexOffset:zi});
      m.on('click', () => selectVehicle(v.vehicleId));
      m.addTo(map);
      markers[v.vehicleId] = m;
    }
  });

  Object.keys(markers).forEach(id => {
    if (!seen.has(id)) removeMarkerInstance(id);
  });
  Object.keys(busDots).forEach(id => {
    if (!seen.has(id)) removeBusDot(id);
  });
}

function drawShape(shapeId, type) {

// Haversine distance in metres
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000, phi1=lat1*Math.PI/180, phi2=lat2*Math.PI/180;
  const dPhi=(lat2-lat1)*Math.PI/180, dLambda=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dPhi/2)**2+Math.cos(phi1)*Math.cos(phi2)*Math.sin(dLambda/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
const fmtDist = m => m<1000?`${Math.round(m)}m`:`${(m/1000).toFixed(1)}km`;
const walkMins= m => { const n=Math.round(m/80); return n<1?'< 1 min walk':`${n} min walk`; };

async function showNearby() {
  if (!S.userPos) { locateMe(); return; }
  if (isMobile() && S.mode==='nearby' && document.getElementById('sidebar').classList.contains('drawer-open')) {
    restoreFullMapFromNearby();
    mobDrawerClose();
    return;
  }
  S.mode='nearby'; S.selectedStop=null; S.selectedId=null;
  document.getElementById('detail').classList.remove('open');
  document.getElementById('mc-nearby').classList.add('on');
  if (isMobile()) mobDrawerOpen();
  const scroll=document.getElementById('sb-scroll');
  scroll.innerHTML=`<div class="empty"><div class="empty-i" style="animation:spin 1s linear infinite;display:inline-block">📍</div><div class="empty-t">Finding nearby stops...</div></div>`;
  try {
    const res  = await fetch(`/api/stops/nearby?lat=${S.userPos.lat}&lon=${S.userPos.lon}&radius=800`);
    const data = await res.json();
    const stops=(data.stops||[])
      .map(s=>({...s,dist:haversine(S.userPos.lat,S.userPos.lon,s.lat,s.lon)}))
      .filter(s=>s.dist<=800).sort((a,b)=>a.dist-b.dist).slice(0,25);
    S.nearbyStops=stops;
    renderNearby(scroll);
  } catch(e) {
    scroll.innerHTML=`<div class="empty"><div class="empty-i">⚠️</div><div class="empty-t">Could not load nearby stops</div></div>`;
  }
}

function renderNearby(scroll) {
  const stops=S.nearbyStops;
  const hdr=`<div class="nearby-hdr"><div class="nearby-hdr-row"><button class="stop-back" onclick="closeNearby()">←</button><div><div class="nearby-title">Nearby stops</div><div class="nearby-sub">${stops.length} stops within 800m</div></div></div></div>`;
  if (!stops.length) { scroll.innerHTML=hdr+`<div class="empty"><div class="empty-i">🔍</div><div class="empty-t">No stops found nearby</div></div>`; return; }
  const rows=stops.map((s,i)=>{
    const icon=s.routeTypes?.includes('tram')?'🚊':s.routeTypes?.includes('train')?'🚆':'🚌';
    return `<div class="nearby-row" onclick="pickStop(${JSON.stringify({stopId:s.stopId,name:s.name,code:s.code,lat:s.lat,lon:s.lon}).replace(/"/g,'&quot;')})" style="animation:fadeUp .12s both;animation-delay:${i*.03}s">
      <div class="nearby-dot">${icon}</div>
      <div class="nearby-body"><div class="nearby-name">${s.name}</div><div class="nearby-meta">Stop ${s.code||s.stopId} · ${walkMins(s.dist)}</div></div>
      <div class="nearby-dist">${fmtDist(s.dist)}</div>
    </div>`;
  }).join('');
  scroll.innerHTML=hdr+rows;
}

function closeNearby() {
  S.mode='list'; S.nearbyStops=[];
  document.getElementById('mc-nearby').classList.remove('on');
  renderSidebar();
  syncControlState();
}

function renderSidebar() {

  });

function vehicleGroupsFor(list) {
  const to = {tram:0,train:1,bus:2};
  const sorted = [...list].sort((a,b) => {
    const fa=S.favs.includes(a.vehicleId)?0:1, fb=S.favs.includes(b.vehicleId)?0:1;
    if (fa!==fb) return fa-fb;
    if (to[a.routeType]!==to[b.routeType]) return to[a.routeType]-to[b.routeType];
    const ma=a.speed>0.5?0:1, mb=b.speed>0.5?0:1;
    if (ma!==mb) return ma-mb;
    return b.speed-a.speed;
  });
  const groups={};
  sorted.forEach(v => {
    const gk = (S.tab==='all'&&!S.filterRoute)?v.routeType:v.routeShort||v.routeType;
    if (!groups[gk]) groups[gk]=[];
    groups[gk].push(v);
  });
  return groups;
}

function renderVehicleGroupCards(scroll, groups, extraHtml='') {
  const tc={tram:'var(--tram)',train:'var(--train)',bus:'var(--bus)'};
  const tpb={tram:'var(--tram-lt)',train:'var(--train-lt)',bus:'var(--bus-lt)'};
  const tl={tram:'Trams',train:'Trains',bus:'Buses'};
  const tIcon={tram:'🚊',train:'🚆',bus:'🚌'};

  let html = extraHtml;
  const gkOrder = Object.keys(groups).sort((a,b)=>{
    const ia=['tram','train','bus'].indexOf(a), ib=['tram','train','bus'].indexOf(b);
    if (ia>-1&&ib>-1) return ia-ib; if (ia>-1) return -1; if (ib>-1) return 1; return a.localeCompare(b);
  });
  gkOrder.forEach(gk => {
    const gvs=groups[gk];
    const isType=['tram','train','bus'].includes(gk);
    const gc  = isType?tc[gk]:vColor(gvs[0].routeType,1);
    const gpb = isType?tpb[gk]:vBg(gvs[0].routeType,1);
    const gl  = isType?tl[gk]:`Route ${gk}`;
    const ico = isType?tIcon[gk]:(tIcon[gvs[0].routeType]||'🚌');
    html += `<div class="vg-hdr" style="color:${gc}">${ico} ${gl} <span class="vg-pill" style="background:${gpb};color:${gc}">${gvs.length}</span></div>`;
    gvs.forEach((v,i) => {
      const sel=v.vehicleId===S.selectedId, fav=S.favs.includes(v.vehicleId);
      const col=vColor(v.routeType,v.speed), bg=vBg(v.routeType,v.speed);
      const spd=v.speed>0.5?`${Math.round(v.speed)} km/h`:'Stopped';
      const spdC=v.speed>0.5?'var(--ok)':'var(--stopped)';
      const occ = v.routeType==='tram'&&v.occupancy ? `<div class="vc-occ">${v.occupancy.emoji} <span>${v.occupancy.label}</span></div>` : '';
      const toward = vehicleToward(v);
      const nextStop = nextStopForVehicle(v);
      html += `<div class="vcard${sel?' sel':''}" data-t="${v.routeType}" onclick="selectVehicle('${v.vehicleId}')" style="animation:fadeUp .15s both;animation-delay:${i*.012}s">
        <div class="vc-bd" style="background:${bg};color:${col}">${(v.routeShort||'').substring(0,6)}</div>
        <div class="vc-body">
          <div class="vc-name">${v.routeLong||v.routeShort||v.vehicleId}</div>
          <div class="vc-sub"><span>Veh ${v.vehicleId}</span><div class="vc-dot"></div><span>${v.headsign||v.routeShort||'—'}</span></div>
          ${toward?`<div class="vc-meta">${toward}</div>`:''}
          ${occ}
          ${nextStop?`<div class="vc-actions"><button class="vc-btn" onclick="openVehicleNextStop('${v.vehicleId}', event)">Next stop</button></div>`:''}
        </div>
        <div class="vc-right">
          <div class="vc-spd" style="color:${spdC}">${spd}</div>
          <div class="vc-bear">${bearDir(v.bearing)} ${Math.round(v.bearing||0)}°</div>
        </div>
        ${fav?'<div class="vc-fav"></div>':''}
        ${v.alerts?.length?'<div class="vc-alert"></div>':''}
      </div>`;
    });
  });
  scroll.innerHTML=html;
  // Scroll to selected
  const selEl = scroll.querySelector('.vcard.sel');
  if (selEl) setTimeout(()=>selEl.scrollIntoView({block:'nearest',behavior:'smooth'}),80);
}

function plannerInputValue(field) {
  const stop = S.planner[field];
  const query = S.planner[`${field}Query`];
  return query || stop?.name || '';
}

function restorePlannerInputFocus(field, value) {
  requestAnimationFrame(() => {
    const el = document.getElementById(`planner-${field}`);
    if (!el) return;
    el.focus();
    const pos = (value || '').length;
    try { el.setSelectionRange(pos, pos); } catch {}
  });
}

async function plannerSearch(field, inputEl) {
  const value = inputEl.value;
  S.planner[`${field}Query`] = value;
  if (S.planner[field] && value !== S.planner[field].name) S.planner[field] = null;
  if (!value.trim() || value.trim().length < 2) {
    const hadSuggestions = (S.planner[`${field}Suggestions`] || []).length > 0;
    S.planner[`${field}Suggestions`] = [];
    if (hadSuggestions) {
      renderSidebar();
      restorePlannerInputFocus(field, value);
    }
    return;
  }
  try {
    const data = await fetch(`/api/stops/search?q=${encodeURIComponent(value.trim())}`).then(r=>r.json());
    S.planner[`${field}Suggestions`] = data.stops || [];
  } catch {
    S.planner[`${field}Suggestions`] = [];
  }
  renderSidebar();
  restorePlannerInputFocus(field, value);
}

function pickPlannerStop(field, stop) {
  S.planner[field] = stop;
  S.planner[`${field}Query`] = '';
  S.planner[`${field}Suggestions`] = [];
  renderSidebar();
}

function swapPlannerStops() {
  const from = S.planner.from, to = S.planner.to;
  S.planner.from = to; S.planner.to = from;
  S.planner.fromQuery = ''; S.planner.toQuery = '';
  S.planner.fromSuggestions = []; S.planner.toSuggestions = [];
  S.planner.results = [];
  renderSidebar();
}

async function runPlanner() {
  if (!S.planner.from?.stopId || !S.planner.to?.stopId) return;
  S.planner.loading = true;
  S.planner.results = [];
  renderSidebar();
  try {
    const data = await fetch(`/api/plan?fromStopId=${encodeURIComponent(S.planner.from.stopId)}&toStopId=${encodeURIComponent(S.planner.to.stopId)}`).then(r=>r.json());
    S.planner.results = data.options || [];
    if (S.planner.from?.lat && S.planner.from?.lon && S.planner.to?.lat && S.planner.to?.lon) {
      map.fitBounds([[S.planner.from.lat,S.planner.from.lon],[S.planner.to.lat,S.planner.to.lon]], {padding:[40,40]});
    }
  } catch {
    S.planner.results = [];
  } finally {
    S.planner.loading = false;
    renderSidebar();
  }
}

function openPlanner() {
  S.mode = 'planner';
  S.selectedId = null;
  S.selectedStop = null;
  document.getElementById('detail').classList.remove('open','expanded','follow-compact');
  renderSidebar();
  syncControlState();
  if (isMobile()) mobDrawerOpen();
}

function closePlanner() {
  S.mode = 'list';
  S.planner.fromSuggestions = [];
  S.planner.toSuggestions = [];
  renderSidebar();
  syncControlState();
}

function focusPlannerOption(opt) {
  if (opt.vehicleId) {
    selectVehicle(opt.vehicleId);
    return;
  }
  if (S.planner.from?.lat && S.planner.from?.lon) {
    focusStopOnMap(S.planner.from);
  }
}

function renderPlanner(scroll) {
  const fromSuggestions = S.planner.fromSuggestions.map(s => `<div class="planner-suggestion" onclick="pickPlannerStop('from',${JSON.stringify(s).replace(/"/g,'&quot;')})"><div class="dd-name">${s.name}</div><div class="dd-sub">Stop ${s.code||s.stopId}</div></div>`).join('');
  const toSuggestions = S.planner.toSuggestions.map(s => `<div class="planner-suggestion" onclick="pickPlannerStop('to',${JSON.stringify(s).replace(/"/g,'&quot;')})"><div class="dd-name">${s.name}</div><div class="dd-sub">Stop ${s.code||s.stopId}</div></div>`).join('');
  const results = S.planner.results.length ? S.planner.results.map((opt,i) => {
    const col=vColor(opt.routeType,1), bg=vBg(opt.routeType,1);
    const dep = { realtimeTime: opt.departureRealtime, scheduledTime: opt.departureScheduled, delay: opt.departureDelay, tripId: opt.tripId, routeId: opt.routeId };
    const arrTs = opt.arrivalTs != null ? ((opt.arrivalTs - Date.now()) / 60000) : null;
    const arrCd = fmtCountdown(arrTs);
    return `<div class="planner-route" onclick="focusPlannerOption(${JSON.stringify(opt).replace(/"/g,'&quot;')})" style="animation:fadeUp .15s both;animation-delay:${i*.03}s">
      <div class="planner-badge" style="background:${bg};color:${col}">${(opt.routeShort||'').substring(0,6)}</div>
      <div class="planner-body">
        <div class="planner-route-name">${opt.routeLong||opt.routeShort||opt.routeId}</div>
        <div class="planner-meta">To: ${opt.headsign||opt.toStopName}</div>
        <div class="planner-inline">
          <span class="planner-chip">${opt.stopsBetween ? `${opt.stopsBetween} stops between` : 'Direct stop-to-stop'}</span>
          ${opt.vehicleId ? `<span class="planner-chip">Veh ${opt.vehicleId}</span>` : `<span class="planner-chip">Scheduled trip</span>`}
        </div>
      </div>
      <div class="planner-times">
        <div>${etaPillFromDeparture(dep, 'plan-'+i)}</div>
        <div class="planner-time-sub">${arrCd ? `Arrives ${arrCd.text}` : (opt.arrivalScheduled||'')}</div>
      </div>

  }).join('') : `<div class="empty"><div class="empty-i">${S.planner.loading ? '⏳' : '🗺️'}</div><div class="empty-t">${S.planner.loading ? 'Finding trips...' : 'Choose origin and destination stops'}</div><div class="empty-s">${!S.planner.loading && S.planner.from && S.planner.to ? 'No direct upcoming trips found yet' : 'Direct trip planner using live Adelaide Metro data'}</div></div>`;

  scroll.innerHTML = `<div class="planner-head"><button class="stop-back" onclick="closePlanner()">←</button><div><div class="planner-title">Trip Planner</div><div class="planner-sub">Direct trips between two stops</div></div></div>
    <div class="planner-wrap">
      <div class="planner-card">
        <div class="planner-grid">
          <div class="planner-field">
            <div class="planner-label">From</div>
            <input class="planner-input" id="planner-from" value="${plannerInputValue('from').replace(/"/g,'&quot;')}" oninput="plannerSearch('from',this)" placeholder="Search origin stop">
            ${fromSuggestions ? `<div class="planner-suggestions">${fromSuggestions}</div>` : ''}
          </div>
          <button class="planner-swap" onclick="swapPlannerStops()" aria-label="Swap origin and destination">⇅</button>
          <div class="planner-field">
            <div class="planner-label">To</div>

            ${toSuggestions ? `<div class="planner-suggestions">${toSuggestions}</div>` : ''}
          </div>
          <button class="planner-btn" onclick="runPlanner()" ${(!S.planner.from || !S.planner.to || S.planner.loading)?'disabled':''}>Find Trips</button>

      </div>

}

async function renderStopBoard(scroll) {
  const stop = S.selectedStop;
  const requestId = ++S.stopBoardRequestId;
  scroll.innerHTML=`<div class="stop-hdr"><div class="stop-hdr-row"><button class="stop-back" onclick="closeStop()">←</button><div><div class="stop-name-big">${stop.name||stop.stopId}</div>${stop.code?`<div class="stop-id-sm">Stop ${stop.code}</div>`:''}</div></div></div><div class="empty"><div class="empty-i" style="animation:spin 1s linear infinite;display:inline-block">⏳</div><div class="empty-t">Loading departures...</div></div>`;
  try {
    const data = await fetch(`/api/stops/${stop.stopId}/departures`).then(r=>r.json());
    if (requestId !== S.stopBoardRequestId || S.mode !== 'stop' || !S.selectedStop || S.selectedStop.stopId !== stop.stopId) return;
    const allServices = (data.departures||[]).sort((a,b) => (departureTs(a) ?? Number.MAX_SAFE_INTEGER) - (departureTs(b) ?? Number.MAX_SAFE_INTEGER));
    const upcoming = upcomingDeparturesOnly(allServices);
    if (!allServices.length) {
      scroll.innerHTML = `<div class="stop-hdr"><div class="stop-hdr-row"><button class="stop-back" onclick="closeStop()">←</button><div><div class="stop-name-big">${data.stopName||stop.name}</div></div></div></div><div class="empty"><div class="empty-i">🚏</div><div class="empty-t">No departures found</div></div>`;
      return;
    }
    resetEtaTargets();
    const baseList = upcoming.length ? upcoming : allServices;
    const visible = S.stopShowAll ? allServices : baseList.slice(0,6);
    let rows='';
    visible.forEach((d,i) => {
      const col=vColor(d.routeType,1), bg=vBg(d.routeType,1);
      const occSpan = d.routeType==='tram'&&d.occupancy?`<span title="${d.occupancy.label}" style="margin-left:4px">${d.occupancy.emoji}</span>`:'';
      const timeHtml = etaPillFromDeparture(d, i);
      rows+=`<div class="dep-row" onclick="selectVehicleFromStop('${d.vehicleId||''}')" style="opacity:${d.vehicleId?1:.65}">
        <div class="dep-bd" style="background:${bg};color:${col}">${(d.routeShort||'').substring(0,6)}</div>
        <div class="dep-body">
          <div class="dep-route">${d.routeLong||d.routeShort||d.routeId}${occSpan}</div>
          <div class="dep-head">${d.headsign?`To: ${d.headsign}`:'Service'}${!d.vehicleId?'<span class="dep-tag">Scheduled</span>':''}</div>
        </div>
        ${timeHtml}
      </div>`;
    });
    const meta = S.stopShowAll
      ? `Stop ${stop.stopId} · full service (${allServices.length})`
      : upcoming.length
        ? `Stop ${stop.stopId} · next available + ${Math.max(visible.length-1,0)} more`
        : `Stop ${stop.stopId} · showing available services`;
    const moreBtn = !S.stopShowAll && allServices.length > visible.length ? `<div class="dep-actions"><button class="dep-more-btn" onclick="showAllStopServices()">Show full service (${allServices.length})</button></div>` : '';
    scroll.innerHTML = `<div class="stop-hdr"><div class="stop-hdr-row"><button class="stop-back" onclick="closeStop()">←</button><div><div class="stop-name-big">${data.stopName||stop.name}</div><div class="stop-id-sm">${meta}</div></div></div></div>${rows}${moreBtn}`;
  } catch(e) {
    scroll.innerHTML = `<div class="stop-hdr"><div class="stop-hdr-row"><button class="stop-back" onclick="closeStop()">←</button><div><div class="stop-name-big">${stop.name}</div></div></div></div><div class="empty"><div class="empty-i">⚠️</div><div class="empty-t">Failed to load departures</div></div>`;
  }
}
function closeStop() {
  S.stopBoardRequestId++;
  S.selectedStop=null; S.mode='list'; S.stopShowAll=false;
  resetEtaTargets();
  renderSidebar();
}
function showAllStopServices() {
  S.stopShowAll=true;
  renderSidebar();
}
function selectVehicleFromStop(id) {
  if (!id) {
    focusStopOnMap(S.selectedStop);
    return;
  }
  S.mode='list'; S.selectedStop=null; S.stopShowAll=false;
  if (S.stopFocusLayer) { S.stopFocusLayer.remove(); S.stopFocusLayer=null; }
  selectVehicle(id);
}

// VEHICLE SELECTION
// â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
function selectVehicle(id) {
  S.selectedId=id; S.selectedStop=null;
  S.mode='list';
  // Reset stop tracking so first poll doesn't trigger a spurious re-render
  delete S.prevStopSeq[id];
  let v = S.vehicles.find(x => x.vehicleId === id);
  if (!v) return;
  renderSidebar(); updateMarkers();
  map.panTo([v.lat,v.lon], {animate:true, duration:.5});

  // Fetch detailed vehicle payload (with upcomingStops)
  document.getElementById('dp-title').textContent=`Loading...`;
  document.getElementById('detail').classList.add('open');
  updateDetailActionButtons();
  syncControlState();
  mobileOpenDetail();

  fetch(`/api/vehicles/${id}`).then(r=>r.json()).then(data => {
    if (data && data.vehicleId) {
      // Overwrite local subset with detailed set
      const idx = S.vehicles.findIndex(x=>x.vehicleId === id);
      if (idx > -1) S.vehicles[idx] = data;
      v = data;
    }
    document.getElementById('dp-title').textContent=`${v.routeShort||'Vehicle'} — ${v.headsign||'Details'}`;
    renderDetailContent(v);
    loadDetailData(v);
  }).catch(e => {
    document.getElementById('dp-title').textContent=`${v.routeShort||'Vehicle'} — ${v.headsign||'Details'}`;
    renderDetailContent(v);
    loadDetailData(v);
  });
}

function closeDetail() {
  S.selectedId = null;
  if (S.followMode) {
    S.followMode = false;
    document.getElementById('mc-follow').classList.remove('on');
  }
  if (S.stopFocusLayer) { S.stopFocusLayer.remove(); S.stopFocusLayer=null; }
  if (S.shapeLayer) { S.shapeLayer.remove(); S.shapeLayer=null; }
  document.getElementById('detail').classList.remove('open','expanded','follow-compact');
  updateDetailActionButtons();
  renderSidebar(); updateMarkers();
  syncControlState();
  map.setView(ADELAIDE,12,{animate:true});
}

function toggleFav() {
  if (!S.selectedId) return;
  const i=S.favs.indexOf(S.selectedId);
  if (i>-1) S.favs.splice(i,1); else S.favs.push(S.selectedId);
  saveFavs();
  updateDetailActionButtons();
  syncControlState();
  renderSidebar();
}

      <div class="gps-cell"><div class="gps-lbl">Longitude</div><div class="gps-val" id="gv-lon">${v.lon?.toFixed(6)}</div></div>

    <div id="stops-zone"><div class="empty-t" style="text-align:center;padding:16px;color:var(--ink3)">Loading...</div></div>
    <div class="d-sec">Trip Info</div>
    <div class="trip-grid">
      <div class="ti-cell"><div class="ti-lbl">Trip</div><div class="ti-val">${v.tripId||'—'}</div></div>
      <div class="ti-cell"><div class="ti-lbl">Route</div><div class="ti-val">${v.routeId||'—'}</div></div>

}

async function loadDetailData(v) {
  if (!v.tripId) { const sz=document.getElementById('stops-zone'); if(sz) sz.innerHTML='<div class="empty-t" style="text-align:center;padding:16px;color:var(--ink3)">No trip data</div>'; return; }
  try {
    if (v.upcomingStops?.length) {
      renderStopTimelineDirect(v.upcomingStops, v.routeType, !!v.upcomingStops[0]?.arrivalTime);
    }
    if (!S.tripCache[v.tripId]) {
      const r=await fetch(`/api/trips/${v.tripId}`); S.tripCache[v.tripId]=await r.json();
    }
    const td=S.tripCache[v.tripId];
    if (!v.upcomingStops?.length) renderStopTimeline(td.stops||[], v.stopSeq||0, v.routeType, td.hasRealtime);
    const ns=(td.stops||[]).find(s=>s.sequence>=(v.stopSeq||0));
    if (ns) {
      const d=fmtDelay(ns.delay);
      const kd=document.getElementById('kv-dly');
      if (kd&&d) { kd.textContent=d.label; kd.style.color=d.color; kd.style.fontSize='13px'; }
    }
    if (v.shapeId) {
      if (!S.shapeCache[v.shapeId]) {
        fetch(`/api/shape/${v.shapeId}`).then(r=>r.json()).then(data => {
          S.shapeCache[v.shapeId]=data.points||[];
          if (S.selectedId===v.vehicleId) drawShape(v.shapeId,v.routeType);
        }).catch(()=>{});
      } else drawShape(v.shapeId,v.routeType);
    }
  } catch(e) { const sz=document.getElementById('stops-zone'); if(sz) sz.innerHTML='<div class="empty-t" style="text-align:center;padding:16px;color:var(--ink3)">Stop data unavailable</div>'; }
}


function renderStopTimelineRows(el, stops, type, hasRT) {
  if (!stops?.length) { el.innerHTML='<div class="empty-t" style="text-align:center;padding:16px;color:var(--ink3)">End of line</div>'; return; }
  const dc  = type==='tram'?'var(--tram)':type==='train'?'var(--train)':'var(--bus)';
  const dlt = type==='tram'?'var(--tram-lt)':type==='train'?'var(--train-lt)':'var(--bus-lt)';
  let html = '<div class="stop-tl">';
  if (!hasRT) html += '<div style="padding:4px 14px 8px;font-size:10px;color:var(--ink3);display:flex;gap:4px;align-items:center">\u{1F4C5} Scheduled times only</div>';
  stops.forEach((s, i) => {
    const state = s.timelineStatus || (i === 0 ? 'next' : 'upcoming');
    const isPast = state === 'passed';
    const isCurrent = state === 'current';
    const isNext = state === 'next';
    const rtIso  = s.arrivalTime || s.departureTime;
    const delay  = fmtDelay(deriveDelaySeconds(s));
    const mins   = minsUntil(rtIso);
    const cd     = mins !== null ? fmtCountdown(mins) : null;
    const schedDisplay = scheduledTimeDisplay(s.scheduledTime);
    let timeHtml = '';
    if (isPast) {
      timeHtml = '<span class="stop-sched">' + schedDisplay + '</span><span class="stop-delay ontime">Passed</span>';
    } else if (isCurrent) {
      timeHtml = '<span class="stop-delay ontime">Current stop</span>';
      if (schedDisplay) timeHtml = '<span class="stop-sched">' + schedDisplay + '</span> ' + timeHtml;
      if (rtIso) timeHtml += '<span class="stop-rt" style="color:' + (delay?.color || dc) + '">' + fmtTime(rtIso) + '</span>';
    } else if (isNext && cd) {
      const key = 'eta-tl-' + (rtIso||i);
      S.etaTargets[key] = { iso: rtIso };
      timeHtml = '<span class="eta-pill ' + cd.cls + '" data-eta="' + key + '" style="font-size:11px;padding:2px 7px">' + cd.text + '</span>';
    } else if (rtIso) {
      timeHtml = '<span class="stop-rt" style="color:' + (delay?.color || 'var(--ok)') + '">' + fmtTime(rtIso) + '</span>';
    }
    if (s.scheduledTime && !isNext && !isCurrent && !isPast) timeHtml = '<span class="stop-sched">' + schedDisplay + '</span> ' + timeHtml;
    if (delay && !isNext && !isCurrent && !isPast) timeHtml += '<span class="stop-delay ' + delay.cls + '">' + delay.label + '</span>';
    const dotClass = isPast ? ' past' : isCurrent ? ' cur nxt' : isNext ? ' nxt' : '';
    const dotStyle = isPast
      ? ''
      : (isCurrent || isNext)
        ? 'background:' + dc + ';border-color:' + dc + ';box-shadow:0 0 0 3px ' + dlt
        : '';
    const label = isPast ? '(passed)' : isCurrent ? '(current)' : isNext ? '(next)' : '';
    html += '<div class="stop-row">'
      + '<div class="stop-spine"><div class="stop-dot' + dotClass + '" style="' + dotStyle + '"></div>' + (i < stops.length-1 ? '<div class="stop-conn"></div>' : '') + '</div>'
      + '<div class="stop-content">'
      + '<div class="stop-nm" style="' + ((isNext || isCurrent) ? 'color:' + dc + ';font-weight:700' : (isPast ? 'color:var(--ink3)' : '')) + '">' + (s.stopName||s.stopId) + (label ? '<span style="font-size:9px;opacity:.7;margin-left:4px">' + label + '</span>' : '') + '</div>'
      + '<div class="stop-times">' + timeHtml + '</div>'
      + '</div></div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

function renderStopTimelineDirect(upcoming, type, hasRT) {
  const el = document.getElementById('stops-zone');
  if (el) renderStopTimelineRows(el, upcoming, type, hasRT);
}


function renderStopTimeline(stops, curSeq, type, hasRT) {
  const el = document.getElementById('stops-zone');
  if (!el) return;
  const currentIdx = Math.max(stops.findIndex(s => (s.sequence || 0) >= (curSeq || 0)), 0);
  const startIdx = Math.max(0, currentIdx - 3);
  const visible = stops.slice(startIdx).map((s, idx) => {
    const absoluteIdx = startIdx + idx;
    let timelineStatus = 'upcoming';
    if (absoluteIdx < currentIdx) timelineStatus = 'passed';
    else if (absoluteIdx === currentIdx) timelineStatus = 'current';
    else if (absoluteIdx === currentIdx + 1) timelineStatus = 'next';
    return { ...s, timelineStatus };
  });
  renderStopTimelineRows(el, visible, type, hasRT);
}

// â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
let searchTimer=null;
document.getElementById('search-in').addEventListener('input', e => {

  const q=document.getElementById('search-in').value.trim();

});
document.getElementById('search-clear').addEventListener('click', () => {
  document.getElementById('search-in').value='';
